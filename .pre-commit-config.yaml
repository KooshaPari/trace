# Pre-commit hooks configuration - OPTIMIZED FOR SPEED (<5s target)
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update: pre-commit autoupdate
#
# PERFORMANCE NOTES:
# - Slow checks (mypy, basedpyright, semgrep, interrogate, pytest) moved to CI
# - Fast linting/formatting kept in pre-commit
# - Parallel execution enabled
# - File filtering optimized for changed files only

repos:
  # ============================================================================
  # FAST CHECKS - Run locally on every commit (target: <5s)
  # ============================================================================

  # Ruff - Lightning-fast linting and formatting (Python)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        # Only check staged Python files
        pass_filenames: true
      - id: ruff-format
        # Only format staged Python files
        pass_filenames: true

  # Basic file quality checks (very fast)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        pass_filenames: true
      - id: end-of-file-fixer
        pass_filenames: true
      - id: check-yaml
        pass_filenames: true
      - id: check-added-large-files
        args: ['--maxkb=1000']
        pass_filenames: true
      - id: check-merge-conflict
        pass_filenames: true
      - id: debug-statements
        pass_filenames: true
      - id: mixed-line-ending
        args: ['--fix=lf']
        pass_filenames: true

  # Unused imports and variables (fast cleanup)
  - repo: https://github.com/hadialqattan/pycln
    rev: v2.2.2
    hooks:
      - id: pycln
        args: [--all]
        pass_filenames: true

  # YAML/JSON/Markdown formatting (fast)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown]
        pass_filenames: true
        # Only check changed files
        files: \.(ya?ml|json|md)$

  # Go - format only (fast, lint moved to CI)
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt (backend)
        entry: gofmt -s -w
        language: system
        types: [go]
        files: ^backend/
        pass_filenames: true

  # Frontend - Biome (fast lint + format)
  - repo: local
    hooks:
      - id: biome-frontend
        name: biome (frontend - fast)
        entry: bash -c 'cd frontend && bun run check:fix'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(js|ts|tsx|jsx|json|mjs|cjs)$

# ============================================================================
# SLOW CHECKS - MOVED TO CI ONLY (See .github/workflows/quality.yml)
# ============================================================================
# The following checks are now CI-only for better developer experience:
# - MyPy (type checking) - runs in CI quality.yml
# - basedpyright (ultra-strict type checking) - runs in CI quality.yml
# - Bandit (security) - runs in CI quality.yml
# - Semgrep (security) - runs in CI quality.yml
# - Interrogate (docstring coverage) - runs in CI quality.yml
# - Tach (architecture boundaries) - runs in CI quality.yml
# - golangci-lint (Go comprehensive lint) - runs in CI ci.yml
# - pytest (tests) - runs in CI ci.yml and tests.yml
#
# Run these manually when needed:
#   uv run mypy src/
#   uv run basedpyright src/
#   uv run bandit -r src/
#   semgrep --config=p/security-audit src/
#   uv run interrogate -vv src/
#   uv run tach check
#   cd backend && golangci-lint run
#   pytest
# ============================================================================

# Global settings
default_language_version:
  python: python3.12

# Exclude patterns (optimized for performance)
exclude: |
  (?x)^(
    \.venv/|
    venv/|
    __pycache__/|
    \.pytest_cache/|
    \.mypy_cache/|
    \.ruff_cache/|
    \.git/|
    \.github/|
    build/|
    dist/|
    \.egg-info/|
    node_modules/|
    \.next/|
    coverage/|
    htmlcov/|
    .*\.lock$|
    .*\.log$
  )

# Performance optimizations
default_stages: [pre-commit]
fail_fast: true  # Stop on first error for faster feedback
minimum_pre_commit_version: 2.15.0

# Parallel execution (enabled by default in pre-commit v3.0+)
# This will run independent hooks in parallel automatically

