version: "0.5"

# Global settings
# Logs: one file per process under log_location; truncate on start (make dev / make dev-tui use --logs-truncate).
# App services (go-backend, python-backend, frontend, caddy) wrap with scripts/shell/with-lifecycle.sh for [LIFECYCLE] START/STOP in logs.
log_location: .process-compose/logs
log_level: info
shell:
  shell_command: "/bin/bash"
  shell_argument: "-c"

environment:
  - "PYTHONUNBUFFERED=1"
  - "GO_ENV=development"
  - "LOG_FORMAT=json"

# Stack: postgres, redis, neo4j, nats | temporal, prometheus | exporters |
# go-backend, python-backend, frontend | caddy, grafana
# Optional (not in file): MinIO (S3), temporal-worker

# Config / hot reload:
# - Caddy: --watch reloads Caddyfile.dev on change (no restart).
# - Prometheus & Grafana: use watchexec via scripts/shell/run-with-config-watch.sh to restart on config change.
#   Install watchexec for config reload: brew install watchexec. Without it, processes run normally (no watch).
#   Prometheus can also reload without restart: curl -X POST http://localhost:9090/-/reload
# - Go: Air watches backend source and rebuilds. Python: uvicorn --reload. Frontend: Vite HMR.
# - This config: apply with `process-compose project update -f config/process-compose.yaml` or Ctrl+L in TUI.

processes:
  #############################################################################
  # Layer 1: Infrastructure Services
  #############################################################################

  postgres:
    # Wrapper: skip start if already running (avoids postmaster.pid already exists)
    command: "bash scripts/shell/postgres-if-not-running.sh"
    availability:
      restart: on_failure
      max_restarts: 5
      backoff_seconds: 2
    readiness_probe:
      exec:
        command: "pg_isready -h localhost -p 5432 -U tracertm"
      initial_delay_seconds: 2
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3
    environment:
      - "PGDATA=/opt/homebrew/var/postgresql@17"
      - "PGPORT=5432"

  redis:
    # Wrapper: skip start if already running (avoids 6379 already in use)
    command: "bash scripts/shell/redis-if-not-running.sh"
    availability:
      restart: on_failure
      max_restarts: 5
    readiness_probe:
      exec:
        command: "redis-cli -h localhost -p 6379 ping"
      initial_delay_seconds: 1
      period_seconds: 3
      timeout_seconds: 2
      success_threshold: 1
      failure_threshold: 2

  neo4j:
    # Use wrapper so we don't fail with "already running" when brew or previous run has neo4j up
    command: "bash scripts/shell/neo4j-console-if-not-running.sh"
    availability:
      restart: on_failure
      max_restarts: 3
    readiness_probe:
      http_get:
        host: localhost
        port: 7474
        path: /
      initial_delay_seconds: 15
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 2
    environment:
      - "NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}"
      - "NEO4J_ACCEPT_LICENSE_AGREEMENT=yes"

  nats:
    # Wrapper: skip start if port 4222 already in use (avoids "address already in use" on restart)
    command: "bash scripts/shell/nats-if-not-running.sh"
    availability:
      restart: on_failure
      max_restarts: 5
    readiness_probe:
      http_get:
        host: localhost
        port: 8222
        path: /healthz
      initial_delay_seconds: 2
      period_seconds: 3
      timeout_seconds: 2
      success_threshold: 1
      failure_threshold: 2

  minio:
    # Wrapper: skip start if already running (avoids address already in use)
    command: "bash scripts/shell/minio-if-not-running.sh"
    working_dir: "."
    availability:
      restart: on_failure
      max_restarts: 3
    readiness_probe:
      http_get:
        host: localhost
        port: 9000
        path: /minio/health/live
      initial_delay_seconds: 3
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 2
    environment:
      - "MINIO_ROOT_USER=${S3_ACCESS_KEY_ID:-minioadmin}"
      - "MINIO_ROOT_PASSWORD=${S3_SECRET_ACCESS_KEY:-minioadmin}"

  vault:
    # Wrapper: skip start if already running; dev mode for local development
    # Dev mode: in-memory storage, auto-unsealed, root token = dev-root-token
    # Production: use proper storage backend and auth method
    command: "bash scripts/shell/vault-if-not-running.sh"
    working_dir: "."
    availability:
      restart: on_failure
      max_restarts: 3
    readiness_probe:
      http_get:
        host: localhost
        port: 8200
        path: /v1/sys/health
      initial_delay_seconds: 3
      period_seconds: 10
      timeout_seconds: 5
    environment:
      - "VAULT_ADDR=http://127.0.0.1:8200"
      - "VAULT_DEV_ROOT_TOKEN_ID=dev-root-token"

  #############################################################################
  # Layer 2: Workflow & Monitoring
  #############################################################################

  temporal:
    # Wrapper: skip start if already running (avoids addr already in use)
    command: "bash scripts/shell/temporal-if-not-running.sh"
    working_dir: "."
    depends_on:
      postgres:
        condition: process_healthy
    availability:
      restart: on_failure
      max_restarts: 3
    # Temporal frontend is gRPC-only on 7233; HTTP GET returns binary → "malformed HTTP response"
    readiness_probe:
      exec:
        command: "nc -z localhost 7233"
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 2
    environment:
      - "TEMPORAL_CLI_ADDRESS=localhost:7233"

  prometheus:
    # When watchexec is installed (brew install watchexec), restarts on deploy/monitoring/prometheus.yml change.
    # Without watchexec: manual reload via curl -X POST http://localhost:9090/-/reload
    command: "bash scripts/shell/run-with-config-watch.sh deploy/monitoring/prometheus.yml -- prometheus --config.file=deploy/monitoring/prometheus.yml --storage.tsdb.path=.prometheus --web.console.libraries=/opt/homebrew/share/prometheus/console_libraries --web.console.templates=/opt/homebrew/share/prometheus/consoles --web.enable-lifecycle"
    working_dir: "."
    availability:
      restart: on_failure
    readiness_probe:
      http_get:
        host: localhost
        port: 9090
        path: /-/ready
      initial_delay_seconds: 3
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 2

  #############################################################################
  # Layer 3: Exporters & Log Aggregation
  #############################################################################

  jaeger:
    # All-in-one Jaeger deployment for local development
    # Ports: 16686 (UI), 4317 (OTLP gRPC), 4318 (OTLP HTTP), 14268 (collector HTTP)
    command: "bash scripts/shell/jaeger-if-not-running.sh"
    working_dir: "."
    availability:
      restart: on_failure
      max_restarts: 3
    readiness_probe:
      http_get:
        host: localhost
        port: 16686
        path: /
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 2
    environment:
      - "COLLECTOR_OTLP_ENABLED=true"

  loki:
    # Wrapper: skip start if already running (avoids address already in use)
    command: "bash scripts/shell/loki-if-not-running.sh"
    working_dir: "."
    availability:
      restart: on_failure
      max_restarts: 3
    # Loki compactor waits 10m for ring stability by design; use /services endpoint instead of /ready
    # OR: accept that Loki will return 503 for ~10-15s during startup (not a failure, just "starting")
    readiness_probe:
      http_get:
        host: localhost
        port: 3100
        path: /services
      initial_delay_seconds: 3
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 5

  promtail:
    # Wrapper: skip start if already running (avoids address already in use)
    command: "bash scripts/shell/promtail-if-not-running.sh"
    working_dir: "."
    depends_on:
      loki:
        condition: process_healthy
    availability:
      restart: on_failure
      max_restarts: 5
    readiness_probe:
      http_get:
        host: localhost
        port: 9080
        path: /ready
      initial_delay_seconds: 2
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 2

  postgres-exporter:
    # Wrapper: skip start if port 9187 already in use (avoids "address already in use" on restart)
    command: "bash scripts/shell/postgres-exporter-if-not-running.sh"
    depends_on:
      postgres:
        condition: process_healthy
    environment:
      - "DATA_SOURCE_NAME=postgresql://tracertm:${DB_PASSWORD:-tracertm_password}@localhost:5432/tracertm?sslmode=disable"
    readiness_probe:
      http_get:
        host: localhost
        port: 9187
        path: /metrics
      initial_delay_seconds: 5
      period_seconds: 10
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 2

  redis-exporter:
    # Wrapper: skip start if port 9121 already in use (avoids "address already in use" on restart)
    command: "bash scripts/shell/redis-exporter-if-not-running.sh"
    depends_on:
      redis:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        port: 9121
        path: /metrics
      initial_delay_seconds: 2
      period_seconds: 10
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 2

  node-exporter:
    # Wrapper: skip start if port 9100 already in use (avoids "address already in use" on restart)
    command: "bash scripts/shell/node-exporter-if-not-running.sh"
    readiness_probe:
      http_get:
        host: localhost
        port: 9100
        path: /metrics
      initial_delay_seconds: 2
      period_seconds: 10
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 2

  #############################################################################
  # Layer 4: Application Services
  # go-backend only starts after postgres, redis, nats, temporal are healthy.
  # caddy only starts after go-backend, python-backend, frontend are healthy.
  # If go-backend/caddy show "skipped" or stay pending: check infra health and
  # that `air` is in PATH (go install github.com/air-verse/air → $HOME/go/bin).
  #############################################################################

  go-backend:
    command: "bash scripts/shell/with-lifecycle.sh go-backend bash scripts/shell/run-air-in-backend.sh"
    working_dir: "."
    depends_on:
      postgres:
        condition: process_healthy
      redis:
        condition: process_healthy
      nats:
        condition: process_healthy
      temporal:
        condition: process_healthy
    availability:
      restart: on_failure
      max_restarts: 5
    # Probe after migrations + server start; use /api/v1/health (same handler as /health)
    readiness_probe:
      http_get:
        host: localhost
        port: 8080
        path: /api/v1/health
      initial_delay_seconds: 20
      period_seconds: 5
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 2
    environment:
      - "DB_HOST=localhost"
      - "DB_PORT=5432"
      - "DB_USER=tracertm"
      - "DB_PASSWORD=${DB_PASSWORD:-tracertm_password}"
      - "DB_NAME=tracertm"
      - "REDIS_URL=redis://localhost:6379"
      - "NATS_URL=nats://localhost:4222"
      - "TEMPORAL_HOST=localhost:7233"
      - "PORT=8080"
      - "GRPC_PORT=9091"
      - "GIN_MODE=debug"
      - "PYTHON_BACKEND_URL=http://localhost:8000"

  python-backend:
    command: "bash scripts/shell/with-lifecycle.sh python-backend .venv/bin/python -m uvicorn tracertm.api.main:app --reload --host 0.0.0.0 --port 8000"
    working_dir: "."
    depends_on:
      postgres:
        condition: process_healthy
      redis:
        condition: process_healthy
      nats:
        condition: process_healthy
      temporal:
        condition: process_healthy
    availability:
      restart: on_failure
      max_restarts: 5
    # Python preflight polls go-backend and temporal-host with indefinite retry; give it time to complete
    readiness_probe:
      http_get:
        host: localhost
        port: 8000
        path: /health
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    environment:
      - "PYTHONPATH=./src"
      - "DATABASE_URL=postgresql+asyncpg://tracertm:${DB_PASSWORD:-tracertm_password}@localhost:5432/tracertm"
      - "REDIS_URL=redis://localhost:6379"
      - "NATS_URL=nats://localhost:4222"
      - "TEMPORAL_HOST=localhost:7233"
      - "LOG_LEVEL=${LOG_LEVEL:-INFO}"
      - "GO_BACKEND_URL=http://localhost:8080"
      - "OPENAI_API_KEY=${OPENAI_API_KEY:-}"
      - "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}"

  frontend:
    command: "bash scripts/shell/with-lifecycle.sh frontend bash -c 'cd frontend && bun run dev'"
    working_dir: "."
    availability:
      restart: on_failure
      max_restarts: 5
    # Vite can take 15–25s after predev (generate:types); delay first probe so it doesn't fail
    readiness_probe:
      http_get:
        host: localhost
        port: 5173
        path: /
      initial_delay_seconds: 25
      period_seconds: 5
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 2
    environment:
      - "VITE_API_URL=http://localhost:4000"
      - "FRONTEND_PORT=5173"

  #############################################################################
  # Doc sites (Next.js docs + Storybook)
  # Optional services - won't block stack startup if they fail
  #############################################################################

  docs:
    command: "bash scripts/shell/with-lifecycle.sh docs bash -c 'cd frontend && bun run dev:docs'"
    working_dir: "."
    required: false  # Optional: won't fail stack if docs fails
    availability:
      restart: on_failure
      max_restarts: 3
    readiness_probe:
      http_get:
        host: localhost
        port: 3001
        path: /
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 15
      success_threshold: 1
      failure_threshold: 5
    environment:
      - "PORT=3001"

  storybook:
    command: "bash scripts/shell/with-lifecycle.sh storybook bash -c 'cd frontend && bun run dev:storybook'"
    working_dir: "."
    required: false  # Optional: won't fail stack if storybook fails
    availability:
      restart: on_failure
      max_restarts: 3
    readiness_probe:
      http_get:
        host: localhost
        port: 6006
        path: /
      initial_delay_seconds: 20
      period_seconds: 10
      timeout_seconds: 15
      success_threshold: 1
      failure_threshold: 5
    environment:
      - "PORT=6006"

  #############################################################################
  # Layer 5: Gateway & Visualization
  #############################################################################

  caddy:
    command: "bash scripts/shell/with-lifecycle.sh caddy caddy run --config config/Caddyfile.dev --adapter caddyfile --watch"
    depends_on:
      go-backend:
        condition: process_healthy
      python-backend:
        condition: process_healthy
      frontend:
        condition: process_healthy
    availability:
      restart: on_failure
    readiness_probe:
      http_get:
        host: localhost
        port: 4000
        path: /health
      initial_delay_seconds: 5
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 2

  grafana:
    # When watchexec is installed (brew install watchexec), restarts on deploy/monitoring/grafana.ini change.
    # run-grafana.sh uses 'grafana server' (not deprecated grafana-server) and sets --homepath so Grafana finds config defaults.
    command: "bash scripts/shell/run-with-config-watch.sh deploy/monitoring/grafana.ini -- bash scripts/shell/run-grafana.sh"
    working_dir: "."
    required: false  # Optional: monitoring service, won't fail stack if unavailable
    depends_on:
      prometheus:
        condition: process_healthy
      loki:
        condition: process_healthy
    availability:
      restart: on_failure
    # Grafana 10+ uses /api/health; older may use /api/healthz. Try health first for compatibility.
    # Use 127.0.0.1 so the probe uses IPv4; localhost can resolve to [::1] and get connection refused if Grafana binds 127.0.0.1 only.
    readiness_probe:
      http_get:
        host: 127.0.0.1
        port: 3000
        path: /api/health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    environment:
      - "GF_SERVER_HTTP_PORT=3000"
      - "GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}"
      - "GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}"
      - "GF_INSTALL_PLUGINS=redis-datasource"
