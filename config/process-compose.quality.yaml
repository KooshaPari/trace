# Quality checks run in parallel (Go, Python, frontend).
# Use: process-compose -f process-compose.quality.yaml up  (TUI)
# Or:  make quality  (runs suites in parallel via script, then prints action plan by file)
#
# PORT=18080 for quality-go so any server started during Go tests does not conflict
# with a running dev stack (make dev uses 8080 for go-backend).

version: "0.5"

log_location: .quality/logs
log_level: info
shell:
  shell_command: "/bin/bash"
  shell_argument: "-c"

processes:
  quality-go:
    command: "make quality-go"
    working_dir: "."
    availability:
      restart: on_failure
      backoff_seconds: 3
      max_restarts: 5
    environment:
      - "GO_ENV=development"
      - "PORT=18080"

  quality-python:
    command: "make quality-python"
    working_dir: "."
    availability:
      restart: on_failure
      backoff_seconds: 3
      max_restarts: 5
    environment:
      - "PYTHONUNBUFFERED=1"
      - "PYTHONPATH=./src"

  quality-frontend:
    command: "cd frontend && bun run quality"
    working_dir: "."
    availability:
      restart: on_failure
      backoff_seconds: 3
      max_restarts: 5
