# Redis Configuration for TraceRTM Rate Limiting
# ================================================
# Production-ready configuration for Redis used as rate limiting backend
# This configuration balances performance, persistence, and memory efficiency

# Network Configuration
# ----------------------
# Bind to localhost for local development, update for production
bind 127.0.0.1
port 6379

# Set TCP backlog for high connection rates
tcp-backlog 511

# Connection timeout (0 = disable)
timeout 300

# TCP keepalive to detect dead peers
tcp-keepalive 300

# General Configuration
# ---------------------
# Run as daemon (set to no for Docker/process-compose)
daemonize no

# PID file location
pidfile /var/run/redis_6379.pid

# Log level: debug, verbose, notice, warning
loglevel notice

# Log file (empty string = stdout)
logfile ""

# Number of databases
databases 16

# Always show logo on startup
always-show-logo yes

# Memory Configuration
# --------------------
# Maximum memory limit (adjust based on your needs)
# For rate limiting: 256MB-1GB is typically sufficient
# Docker default: no limit (uses container limits)
maxmemory 512mb

# Eviction policy when maxmemory is reached
# Options:
#   - volatile-lru: Remove keys with expire set using LRU
#   - allkeys-lru: Remove any key using LRU
#   - volatile-lfu: Remove keys with expire set using LFU
#   - allkeys-lfu: Remove any key using LFU
#   - volatile-random: Remove random key with expire set
#   - allkeys-random: Remove random key
#   - volatile-ttl: Remove key with nearest expire time
#   - noeviction: Return errors when memory limit is reached
# For rate limiting, volatile-lru is recommended
maxmemory-policy volatile-lru

# LRU/LFU sample size for eviction algorithms
maxmemory-samples 5

# Persistence Configuration - RDB (Snapshotting)
# -----------------------------------------------
# Save the DB on disk:
#   save <seconds> <changes>
#   Will save after <seconds> if at least <changes> keys changed
# For rate limiting, periodic saves are sufficient (not mission-critical data)
save 900 1      # After 900 sec (15 min) if at least 1 key changed
save 300 10     # After 300 sec (5 min) if at least 10 keys changed
save 60 10000   # After 60 sec if at least 10000 keys changed

# Stop writes on background save errors
stop-writes-on-bgsave-error yes

# Compress RDB files
rdbcompression yes

# Checksum RDB files
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Working directory for RDB and AOF files
dir ./

# Persistence Configuration - AOF (Append Only File)
# ---------------------------------------------------
# Enable AOF for better durability (optional for rate limiting)
# AOF provides better durability than RDB but higher disk I/O
appendonly no

# AOF filename
appendfilename "appendonly.aof"

# AOF fsync policy:
#   - always: fsync every write (slow, very safe)
#   - everysec: fsync every second (good balance)
#   - no: let OS decide when to fsync (fast, less safe)
appendfsync everysec

# Don't fsync during AOF rewrite
no-appendfsync-on-rewrite no

# AOF rewrite triggers
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load truncated AOF files
aof-load-truncated yes

# Use RDB-AOF mixed format
aof-use-rdb-preamble yes

# Replication Configuration
# --------------------------
# For production, set up replication for high availability
# Uncomment and configure for replica instances:
# replicaof <masterip> <masterport>
# masterauth <master-password>

# Replica serves stale data when link is down
replica-serve-stale-data yes

# Replica is read-only
replica-read-only yes

# Diskless replication
repl-diskless-sync no
repl-diskless-sync-delay 5

# Security Configuration
# ----------------------
# Require password authentication (HIGHLY RECOMMENDED for production)
# Generate with: openssl rand -base64 32
# requirepass YOUR_STRONG_PASSWORD_HERE

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""
# rename-command SHUTDOWN ""

# Performance Tuning
# ------------------
# Disable slow operations tracking threshold (microseconds)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Maximum number of clients
maxclients 10000

# Lua scripting timeout (milliseconds)
lua-time-limit 5000

# Client output buffer limits
# Format: client-output-buffer-limit <class> <hard limit> <soft limit> <soft seconds>
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of background tasks (1-500, higher = more CPU, faster expiration)
hz 10

# Enable dynamic HZ based on clients
dynamic-hz yes

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB save incremental fsync
rdb-save-incremental-fsync yes

# Active Defragmentation
# -----------------------
# Enable active defragmentation (Redis 4.0+)
# activedefrag no

# Minimum fragmentation percentage to trigger defrag
# active-defrag-ignore-bytes 100mb
# active-defrag-threshold-lower 10

# Maximum fragmentation to trigger aggressive defrag
# active-defrag-threshold-upper 100

# Minimal CPU percentage for defrag
# active-defrag-cycle-min 1

# Maximal CPU percentage for defrag
# active-defrag-cycle-max 25

# Rate Limiting Specific Optimizations
# -------------------------------------
# These settings optimize Redis for rate limiting workloads
# Rate limiting involves frequent key operations with TTLs

# Enable lazy freeing for DEL, UNLINK, and FLUSHDB
lazyfree-lazy-eviction no
lazyfree-lazy-expire yes
lazyfree-lazy-server-del no
replica-lazy-flush no
lazyfree-lazy-user-del no

# Monitoring and Debugging
# ------------------------
# Latency monitoring (0 = disabled, > 0 = threshold in milliseconds)
latency-monitor-threshold 100

# Modules Configuration
# ---------------------
# Load modules if needed (uncomment and adjust path)
# loadmodule /path/to/module.so

# Cluster Configuration
# ---------------------
# For Redis Cluster setup (advanced)
# cluster-enabled no
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000

# Notes for Production Deployment
# ================================
# 1. Set a strong password with requirepass
# 2. Enable persistence based on durability needs:
#    - RDB only: Good for rate limiting (data loss acceptable)
#    - AOF everysec: Better durability with minimal performance impact
#    - AOF always: Maximum durability but slower
# 3. Configure maxmemory based on available RAM
# 4. Set up replication for high availability
# 5. Use Redis Sentinel or Cluster for automatic failover
# 6. Monitor with Redis metrics exporter (see monitoring/prometheus.yml)
# 7. Adjust hz based on CPU availability (higher = faster expiration)
# 8. Enable TLS/SSL for production deployments
# 9. Consider using connection pooling in application code
# 10. Regular monitoring of:
#     - Memory usage (redis-cli INFO memory)
#     - Eviction statistics (redis-cli INFO stats)
#     - Slow log (redis-cli SLOWLOG GET 10)
#     - Latency (redis-cli --latency)
