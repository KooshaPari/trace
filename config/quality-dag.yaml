# Quality DAG: step dependencies for parallel execution with soft-fail.
# Run quality_runner.py to execute; tiers run in parallel within each tier.
version: 1

steps:
  naming:
    deps: []
    command: task lint:naming
    display: Naming
  go-proto:
    deps: []
    command: task proto:gen
    display: Go proto
  go-lint:
    deps: [naming]
    command: task go:lint
    display: Go lint
  go-build:
    deps: [go-proto]
    command: task go:build
    display: Go build
  go-test:
    deps: [go-build]
    command: task go:test
    display: Go test
  py-lint:
    deps: [naming]
    command: poe lint
    display: Python lint
  py-type:
    deps: [naming]
    command: poe type-check
    display: Python type
  py-test:
    deps: [py-lint, py-type]
    command: poe test
    display: Python test
  fe-lint:
    deps: [naming]
    command: bun run --cwd frontend lint
    display: Frontend lint
  fe-type:
    deps: [naming]
    command: bun run --cwd frontend typecheck
    display: Frontend type
  fe-build:
    deps: [fe-lint, fe-type]
    command: bun run --cwd frontend build
    display: Frontend build
  fe-test:
    deps: [fe-build]
    command: bun run --cwd frontend test
    display: Frontend test
