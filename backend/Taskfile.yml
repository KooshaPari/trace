version: '3'

tasks:
  build:
    desc: Build the backend binary
    cmds:
      - go build -o tracertm-backend .

  test:
    desc: Run all tests with race detection and coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...

  test:unit:
    desc: Run unit tests
    cmds:
      - go test -v -short ./...

  test:integration:
    desc: Run integration tests
    cmds:
      - go test -v -run Integration ./...

  test:api:
    desc: Run API tests
    cmds:
      - go test -v -run API ./...

  test:e2e:
    desc: Run E2E tests
    cmds:
      - go test -v -run E2E ./...

  test:security:
    desc: Run security tests
    cmds:
      - go test -v ./tests/security/...

  test:validate:
    desc: Run route validation tests
    cmds:
      - go test -v -race ./internal/handlers -run TestAllRoutes
      - go test -v -race ./internal/handlers -run TestWebSocketCORSHeaders

  test:coverage:
    desc: Generate HTML coverage report
    deps: [test]
    cmds:
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  schema:validate:
    desc: Validate schema alignment
    cmds:
      - ./scripts/validate_schema_alignment.sh

  schema:check:
    desc: Generate sqlc code and validate schema
    deps: [sqlc:generate, schema:validate]

  sqlc:generate:
    desc: Generate sqlc code
    cmds:
      - sqlc generate

  docs:gen:
    desc: Generate OpenAPI documentation
    cmds:
      - ./scripts/generate-openapi.sh

  docs:validate:
    desc: Validate OpenAPI documentation
    cmds:
      - ./scripts/generate-openapi.sh --validate

  atlas:diff:supabase:
    desc: Create a new Atlas migration for Supabase
    vars:
      name: '{{.name | default "new_migration"}}'
    cmds:
      - atlas migrate diff --env supabase --name {{.name}}

  atlas:apply:supabase:
    desc: Apply Atlas migrations to Supabase
    cmds:
      - atlas migrate apply --env supabase

  atlas:status:supabase:
    desc: Show Atlas migration status for Supabase
    cmds:
      - atlas migrate status --env supabase

  quality:
    desc: Run comprehensive quality checks
    deps: [lint, test, schema:validate, docs:validate]

  format:
    desc: Format and vet code
    cmds:
      - gofumpt -w . && go vet ./...

  setup:db:
    desc: Setup databases
    cmds:
      - go run cmd/setup/main.go

  setup:
    desc: Full setup (db + build)
    deps: [setup:db, build]

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f tracertm-backend
      - go clean
