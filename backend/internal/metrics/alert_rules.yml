groups:
  - name: tracertm_service_alerts
    interval: 30s
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: |
          100 * sum(rate(tracertm_requests_total{status=~"5.."}[5m])) by (service) /
          sum(rate(tracertm_requests_total[5m])) by (service) > 5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} for service {{ $labels.service }}"
          runbook_url: "https://wiki.example.com/runbooks/high-error-rate"

      # Critical error rate
      - alert: CriticalErrorRate
        expr: |
          100 * sum(rate(tracertm_requests_total{status=~"5.."}[5m])) by (service) /
          sum(rate(tracertm_requests_total[5m])) by (service) > 20
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "CRITICAL: Very high error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} for service {{ $labels.service }}"

      # Slow requests
      - alert: SlowRequests
        expr: |
          histogram_quantile(0.95, sum(rate(tracertm_request_duration_seconds_bucket[5m])) by (service, le)) > 2
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Slow requests on {{ $labels.service }}"
          description: "P95 latency is {{ $value | humanizeDuration }} for service {{ $labels.service }}"

      # Very slow requests
      - alert: VerySlowRequests
        expr: |
          histogram_quantile(0.95, sum(rate(tracertm_request_duration_seconds_bucket[5m])) by (service, le)) > 5
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "CRITICAL: Very slow requests on {{ $labels.service }}"
          description: "P95 latency is {{ $value | humanizeDuration }} for service {{ $labels.service }}"

  - name: tracertm_cache_alerts
    interval: 30s
    rules:
      # Low cache hit ratio
      - alert: LowCacheHitRatio
        expr: |
          sum(rate(tracertm_cache_hits_total[10m])) by (cache_type) /
          (sum(rate(tracertm_cache_hits_total[10m])) by (cache_type) +
           sum(rate(tracertm_cache_misses_total[10m])) by (cache_type)) < 0.5
        for: 10m
        labels:
          severity: info
          team: backend
        annotations:
          summary: "Low cache hit ratio for {{ $labels.cache_type }}"
          description: "Hit ratio is {{ $value | humanizePercentage }} for {{ $labels.cache_type }}"

      # Very low cache hit ratio
      - alert: VeryLowCacheHitRatio
        expr: |
          sum(rate(tracertm_cache_hits_total[10m])) by (cache_type) /
          (sum(rate(tracertm_cache_hits_total[10m])) by (cache_type) +
           sum(rate(tracertm_cache_misses_total[10m])) by (cache_type)) < 0.2
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "VERY low cache hit ratio for {{ $labels.cache_type }}"
          description: "Hit ratio is {{ $value | humanizePercentage }} for {{ $labels.cache_type }}"

  - name: tracertm_database_alerts
    interval: 30s
    rules:
      # High database latency
      - alert: HighDatabaseLatency
        expr: |
          histogram_quantile(0.95, sum(rate(tracertm_db_query_duration_seconds_bucket[5m])) by (operation, le)) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High database latency for {{ $labels.operation }}"
          description: "P95 latency is {{ $value | humanizeDuration }} for {{ $labels.operation }}"

      # Critical database latency
      - alert: CriticalDatabaseLatency
        expr: |
          histogram_quantile(0.95, sum(rate(tracertm_db_query_duration_seconds_bucket[5m])) by (operation, le)) > 5
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "CRITICAL: Very high database latency for {{ $labels.operation }}"
          description: "P95 latency is {{ $value | humanizeDuration }} for {{ $labels.operation }}"

      # High transaction rollback rate
      - alert: HighTransactionRollbackRate
        expr: |
          100 * rate(tracertm_db_transactions_total{status="rolled_back"}[5m]) /
          rate(tracertm_db_transactions_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High database transaction rollback rate"
          description: "Rollback rate is {{ $value | humanizePercentage }}"

      # Database connection pool exhaustion
      - alert: DatabaseConnectionPoolNearFull
        expr: tracertm_db_connections > 80
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Database connection pool near capacity"
          description: "{{ $value }} connections active (threshold: 80)"

  - name: tracertm_agent_alerts
    interval: 30s
    rules:
      # No active agents
      - alert: NoActiveAgents
        expr: tracertm_active_agents == 0
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "No active agents"
          description: "Agent coordination system has no active agents for 2 minutes"

      # Low agent count
      - alert: LowAgentCount
        expr: tracertm_active_agents < 3
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Low number of active agents"
          description: "Only {{ $value }} agents active (expected: >= 3)"

      # High task error rate
      - alert: HighTaskErrorRate
        expr: |
          100 * sum(rate(tracertm_tasks_completed_total{status="failure"}[5m])) by (agent_type) /
          sum(rate(tracertm_tasks_completed_total[5m])) by (agent_type) > 20
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High task error rate for {{ $labels.agent_type }}"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.agent_type }}"

      # Agent heartbeat failure
      - alert: AgentHeartbeatFailure
        expr: rate(tracertm_agent_heartbeats_total[5m]) == 0
        for: 3m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "No agent heartbeats received"
          description: "No heartbeats from any agent for 3 minutes"

  - name: tracertm_messaging_alerts
    interval: 30s
    rules:
      # High message publish error rate
      - alert: HighMessagePublishErrorRate
        expr: |
          100 * sum(rate(tracertm_message_publish_errors_total[5m])) by (subject) /
          (sum(rate(tracertm_messages_published_total[5m])) by (subject) +
           sum(rate(tracertm_message_publish_errors_total[5m])) by (subject)) > 5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High message publish error rate for {{ $labels.subject }}"
          description: "Error rate is {{ $value | humanizePercentage }} for subject {{ $labels.subject }}"

      # Message consumer lag
      - alert: MessageConsumerLag
        expr: |
          rate(tracertm_messages_published_total[5m]) -
          rate(tracertm_messages_consumed_total[5m]) > 100
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Message consumer lag detected"
          description: "Lag is {{ $value }} messages/sec"

  - name: tracertm_storage_alerts
    interval: 30s
    rules:
      # High storage error rate
      - alert: HighStorageErrorRate
        expr: |
          100 * sum(rate(tracertm_storage_errors_total[5m])) by (operation) /
          (sum(rate(tracertm_storage_uploads_total[5m])) by (operation) +
           sum(rate(tracertm_storage_downloads_total[5m])) by (operation)) > 5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High storage error rate for {{ $labels.operation }}"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.operation }}"

  - name: tracertm_websocket_alerts
    interval: 30s
    rules:
      # WebSocket connection spike
      - alert: WebSocketConnectionSpike
        expr: |
          delta(tracertm_websocket_clients[5m]) > 1000
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "WebSocket connection spike detected"
          description: "Connection increase of {{ $value }} in 5 minutes"

      # No WebSocket clients
      - alert: NoWebSocketClients
        expr: tracertm_websocket_clients == 0
        for: 10m
        labels:
          severity: info
          team: backend
        annotations:
          summary: "No active WebSocket clients"
          description: "No WebSocket clients connected for 10 minutes"

  - name: tracertm_business_alerts
    interval: 60s
    rules:
      # No items created (system idle)
      - alert: SystemIdle
        expr: rate(tracertm_items_created_total[30m]) == 0
        for: 30m
        labels:
          severity: info
          team: backend
        annotations:
          summary: "System appears idle"
          description: "No items created in the last 30 minutes"

      # High search query rate
      - alert: HighSearchQueryRate
        expr: rate(tracertm_search_queries_total[5m]) > 100
        for: 5m
        labels:
          severity: info
          team: backend
        annotations:
          summary: "High search query rate"
          description: "Search query rate is {{ $value }} queries/sec"
