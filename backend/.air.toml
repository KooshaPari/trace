# Air configuration for hot reload development
# https://github.com/air-verse/air

root = "."
testdata_dir = "tests"
tmp_dir = "tmp"

[build]
  args_bin = []
  entrypoint = "./tmp/main"
  cmd = "go build -o ./tmp/main ."
  delay = 15000
  # Exclude dirs that should not trigger rebuilds
  exclude_dir = ["assets", "tmp", "vendor", "frontend", "cli", "desktop", "node_modules", "tests", "scripts", "docs", ".trace", "migrations", "ARCHIVE"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "tmp/build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 15000
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
