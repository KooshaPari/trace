[pytest]
# Pytest configuration for Phase 6 E2E Integration Tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = . integration

# Asyncio configuration (pytest-asyncio 0.23.7)
asyncio_mode = auto

# Markers
markers =
    e2e: End-to-end integration tests requiring all infrastructure
    slow: Tests that take more than 5 seconds
    oauth: Tests requiring OAuth mock/setup
    temporal: Tests requiring Temporal test environment
    skip_ci: Tests to skip in CI environment
    asyncio: Async tests using pytest-asyncio
    anyio: Async tests using pytest-anyio

# Output options
addopts =
    -v
    --strict-markers
    --tb=short

# Coverage
[coverage:run]
source = /Users/kooshapari/temp-PRODVERCEL/485/kush/trace/src/tracertm
omit =
    */tests/*
    */test_*.py
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout
timeout = 300
timeout_method = thread
