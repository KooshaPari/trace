# Example GitHub Actions workflow for E2E tests
# Copy this to .github/workflows/e2e-tests.yml in your repository root

name: E2E Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true
        cache-dependency-path: backend/go.sum

    - name: Verify Docker
      run: |
        docker version
        docker info

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      working-directory: backend
      run: |
        go mod download
        go mod verify

    - name: Run E2E tests
      working-directory: backend
      run: |
        go test -v -tags=e2e -timeout=30m -coverprofile=e2e-coverage.out ./tests/e2e/...

    - name: Generate coverage report
      if: always()
      working-directory: backend
      run: |
        go tool cover -html=e2e-coverage.out -o e2e-coverage.html || true

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-coverage-report
        path: backend/e2e-coverage.html
        retention-days: 30

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-results
        path: backend/test-results.json
        retention-days: 30

    - name: Comment PR with results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = fs.existsSync('backend/e2e-coverage.out')
            ? fs.readFileSync('backend/e2e-coverage.out', 'utf8')
            : 'No coverage data';

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '## E2E Test Results\n\n✅ Tests completed. See artifacts for detailed coverage report.'
          });

  e2e-tests-matrix:
    name: E2E Tests (Matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - auth
          - project
          - search
          - graph
          - agent
          - realtime
          - linking

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run ${{ matrix.test-suite }} tests
      working-directory: backend/tests/e2e
      run: |
        make test-${{ matrix.test-suite }}

    - name: Upload test logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs-${{ matrix.test-suite }}
        path: |
          backend/tests/e2e/*.log
          /tmp/testcontainers-*
        retention-days: 7
