# Docker Compose for E2E Testing
# Use this for local development when you want to run services manually
# instead of using testcontainers

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: trace-e2e-postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: trace_test
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5433:5432"  # Avoid conflict with local postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d trace_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - e2e-network

  redis:
    image: redis:7-alpine
    container_name: trace-e2e-redis
    ports:
      - "6380:6379"  # Avoid conflict with local redis on 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - e2e-network

  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: trace-e2e-meilisearch
    environment:
      MEILI_MASTER_KEY: test-master-key
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: true
    ports:
      - "7701:7700"  # Avoid conflict with local meilisearch on 7700
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - e2e-network

  # Optional: Neo4j for graph database testing
  neo4j:
    image: neo4j:5-community
    container_name: trace-e2e-neo4j
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 512M
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - e2e-network

  # Optional: Mailhog for email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: trace-e2e-mailhog
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - e2e-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  e2e-network:
    driver: bridge
