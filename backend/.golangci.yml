# Comprehensive Go linting – revive comparison + awesome-go-linters
# Run: cd backend && golangci-lint run
# Format: cd backend && gofumpt -w .

version: "2"

run:
  timeout: 10m
  modules-download-mode: readonly
  build-tags: []

linters:
  enable:
    # Defaults (correctness + unused)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style / patterns (revive = golint replacement)
    - revive
    # Extra style/bugs/performance
    - gocritic
    # Security
    - gosec
    # HTTP/DB correctness
    - bodyclose
    - rowserrcheck
    # Complexity
    - gocyclo
    - gocognit
    # Naming / style
    - misspell
    - unconvert
    # Exhaustiveness / correctness
    - exhaustive
    # Performance
    - prealloc
    # More style
    - whitespace
    - nakedret
    - noctx
    # AI coding hardening - Phase 1
    - dupl              # Duplicate code detection
    - goconst           # Repeated strings → constants
    - funlen            # Function length limits
    - mnd               # Magic number detection (strict with ignored-numbers allowlist)
    - nolintlint        # Validate //nolint usage
    - gochecknoglobals  # No global variables
    - perfsprint        # Performance optimization
    - lll               # Line length limits
    - maintidx          # Maintainability index
    - depguard          # Dependency boundaries
    - varnamelen        # Variable name length constraints
    - tagliatelle       # Struct tag naming rules
    # Maximum strictness - Phase 5 (Critical bug prevention)
    - forbidigo         # P0: Debug statement prevention (fmt.Println, log.Print)
    - copyloopvar       # P0: Loop variable capture in goroutines (Go 1.22+ syntax)
    - errorlint         # P0: Error wrapping integrity (Go 1.13+ %w patterns)
    - forcetypeassert   # P0: Type assertion panic prevention (require ,ok pattern)
    - sqlclosecheck     # P0: SQL resource leak detection (unclosed rows/statements)
    - contextcheck      # P0: context.Context propagation validation
    # Maximum strictness - Phase 5 (High-value quality)
    - nilerr            # P1: Nil error returns detection
    - nilnesserr        # P1: Nil error check patterns
    - errchkjson        # P1: JSON marshal/unmarshal error handling
    - wastedassign      # P1: Dead assignment detection
    - musttag           # P1: JSON/XML/YAML struct tag validation
    # Maximum strictness - Phase 6 (New linters)
    - exhaustruct       # Struct initialization completeness (pattern-restricted)
    - usestdlibvars     # Use stdlib constants (http.StatusOK) over literals
    - predeclared       # Prevent shadowing predeclared identifiers
    - sloglint          # log/slog best practices
    - testifylint       # testify assertion best practices
    - exptostd          # Replace deprecated x/ packages with stdlib
    # Additional strictness - error handling, testing, and code quality
    # - wrapcheck         # Error wrapping with %w validation (too strict for pass-through errors)
    - godox             # TODO/FIXME/BUG comment tracking
    - asciicheck        # Non-ASCII identifier detection

  settings:
    revive:
      severity: warning
      confidence: 0.8
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: context-as-argument
        - name: cyclomatic
          arguments: [10]
        - name: line-length-limit
          arguments: [140]
        # No unused-parameter rule - we use blank identifiers (_) intentionally in mocks

    # Maximum strictness settings - Phase 5
    forbidigo:
      forbid:
        - pattern: '^fmt\.Print(f|ln)?$'
          msg: 'Use structured logging (slog) instead of fmt.Print*'
        - pattern: '^log\.(Print|Printf|Println|Fatal|Fatalf|Fatalln)$'
          msg: 'Use structured logging (slog) instead of log.Print*/Fatal*'
      exclude-godoc-examples: true
      analyze-types: true

    gocyclo:
      min-complexity: 15  # Strict cyclomatic complexity threshold
    gocognit:
      min-complexity: 15  # Strict cognitive complexity threshold
    funlen:
      lines: 80
      statements: 50
    mnd:
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign
      # Common literals: time (2,3,5,10,24,30 sec/min/hr), percentage (100), HTTP (200,400,500),
      # bytes/bytes-like (256,512,1024,2048), limits (50,100,1000), file modes (0o600,0o750), scaling (0.1-0.9, 1.0, 2.0).
      ignored-numbers:
        - "2"
        - "3"
        - "4"
        - "5"
        - "6"
        - "7"
        - "10"
        - "12"
        - "15"
        - "20"
        - "24"
        - "25"
        - "30"
        - "32"
        - "50"
        - "60"
        - "70"
        - "80"
        - "100"
        - "200"
        - "255"
        - "256"
        - "400"
        - "500"
        - "512"
        - "1024"
        - "2000"
        - "2048"
        - "4096"
        - "86400"
        - "1000"
        - "10000"
        - "1000000"
        - "0.1"
        - "0.2"
        - "0.25"
        - "0.3"
        - "0.4"
        - "0.5"
        - "0.6"
        - "0.7"
        - "0.8"
        - "0.9"
        - "1.0"
        - "1.1"
        - "1.5"
        - "2.0"
        - "7.0"
        - "10.0"
        - "20.0"
        - "60.0"
        - "85.0"
        - "90.0"
        - "100.0"
        - "336.0"
        - "0o600"
        - "0o750"
        - "1e9"
    lll:
      line-length: 140
      tab-width: 2
    maintidx:
      under: 20
    gosec:
      excludes: []
    depguard:
      rules:
        Main:
          files:
            - "${base-path}/internal/**"
            - "${base-path}/pkg/**"
            - "${base-path}/tests/**"
            - "${base-path}/main.go"
          list-mode: lax
          allow:
            - $gostd
            - "github.com/jackc/pgx/v5"
            - "github.com/joho/godotenv"
            - "github.com/kooshapari/tracertm-backend/internal/config"
            - "github.com/kooshapari/tracertm-backend/internal/env"
            - "github.com/neo4j/neo4j-go-driver/v5/neo4j"
            - "github.com/nats-io"
            - "github.com/nats-io/nats.go"
            - "github.com/nats-io/nkeys"
        cmd:
          files:
            - "cmd/**"
            - "**/cmd/**"
          list-mode: lax
          allow:
            - $gostd
            - "github.com/nats-io"
            - "github.com/nats-io/nats.go"
            - "github.com/nats-io/nkeys"
        domain:
          files:
            - "internal/models/**"
            - "internal/repository/**"
            - "internal/services/**"
            - "internal/db/**"
            - "internal/storage/**"
            - "internal/graph/**"
            - "internal/cache/**"
            - "internal/nats/**"
          deny:
            - pkg: "github.com/kooshapari/tracertm-backend/internal/handlers"
              desc: "Domain layers must not depend on handlers."
            - pkg: "github.com/kooshapari/tracertm-backend/internal/routes"
              desc: "Domain layers must not depend on routes."
            - pkg: "github.com/kooshapari/tracertm-backend/cmd"
              desc: "Domain layers must not depend on command entrypoints."
    varnamelen:
      max-distance: 6
      min-name-length: 2
      check-receiver: false
      check-return: false
      ignore-type-assert-ok: true
      ignore-map-index-ok: true
      ignore-chan-recv-ok: true
      ignore-names:
        - tt  # table test variable
        - tc  # table test case
        - tx  # transaction
        - db  # database
        - wg  # WaitGroup
        - mu  # mutex
        - ok  # bool check
        - id  # identifier
        - eg  # errgroup
        - ip  # IP address
        - fd  # file descriptor
        - fs  # filesystem
        - fn  # function
        - op  # operation
      ignore-decls:
        - c echo.Context
        - e *echo.Echo
        - t testing.T
        - b testing.B
        - r *http.Request
        - w http.ResponseWriter
        - i int
        - j int
        - k int
        - n int
    tagliatelle:
      case:
        use-field-name: true
        rules:
          json: snake
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-no-explanation: []
    exhaustruct:
      include:
        - 'github\.com/kooshapari/tracertm-backend/.*Config$'
        - 'github\.com/kooshapari/tracertm-backend/.*Request$'
        - 'github\.com/kooshapari/tracertm-backend/.*Response$'
        - 'github\.com/kooshapari/tracertm-backend/.*Options$'
      exclude:
        # Large config structs (30+ fields) — impractical to fully init in tests
        - 'github\.com/kooshapari/tracertm-backend/internal/config\.Config$'
        - 'github\.com/kooshapari/tracertm-backend/internal/config\.EmbeddingsConfig$'
        # Search structs with many optional filter fields
        - 'github\.com/kooshapari/tracertm-backend/internal/search\.CrossPerspectiveSearchRequest$'
        - 'github\.com/kooshapari/tracertm-backend/internal/search\.Request$'
        # Embedding provider/indexer config (8+ fields, test-heavy partial init)
        - 'github\.com/kooshapari/tracertm-backend/internal/embeddings\.ProviderConfig$'
        - 'github\.com/kooshapari/tracertm-backend/internal/embeddings\.IndexerConfig$'
        # Cache config (6 fields, partial init in validation tests)
        - 'github\.com/kooshapari/tracertm-backend/internal/cache\.RedisCacheConfig$'
        # NATS config (8+ fields, partial init in tests)
        - 'github\.com/kooshapari/tracertm-backend/internal/nats\.Config$'
        # S3 config (5 fields, validation tests use partial init by design)
        - 'github\.com/kooshapari/tracertm-backend/internal/storage\.S3Config$'
        # Progress request types (6-8 fields, partial init in tests)
        - 'github\.com/kooshapari/tracertm-backend/internal/progress\.Create.*Request$'
        - 'github\.com/kooshapari/tracertm-backend/internal/progress\.Update.*Request$'
        # gRPC protobuf generated types (external/generated)
        - 'github\.com/kooshapari/tracertm-backend/.*\.AnalyzeImpactRequest$'
        - 'github\.com/kooshapari/tracertm-backend/.*\.StreamGraphUpdatesRequest$'
    errcheck:
      check-type-assertions: true
      check-blank: true
    exhaustive:
      default-signifies-exhaustive: false
    nakedret:
      max-func-lines: 5
    wrapcheck:
      # Ignore error returns in test mocks
      ignoreSigTypes:
        - "testing.T"
        - "testing.B"
      # Ignore error wrapping for standard library, protobuf, gRPC, testify
      ignorePackageGlobs:
        - "encoding/*"
        - "crypto/*"
        - "net/*"
        - "io/*"
        - "os/*"
        - "fmt/*"
        - "time/*"
        - "github.com/stretchr/testify/*"
        - "google.golang.org/protobuf/*"
        - "google.golang.org/grpc/*"
        - "github.com/jackc/pgx/v5*"
        - "github.com/labstack/echo/v4*"
        - "go.opentelemetry.io/otel*"
      # Ignore mock-related patterns
      ignoreInterfaceRegexps:
        - "Mock"
        - "Stub"

  exclusions:
    # Don't use default exclusions - we want strict
    generated: lax
    rules:
      # Skip complexity linters for test files (table-driven tests are legitimately complex)
      - path: _test\.go
        linters:
          - gocognit
          - gocyclo
          - funlen
      # Skip revive cyclomatic complexity for test files (handled by gocyclo exclusion above)
      - path: _test\.go
        text: "cyclomatic"
        linters:
          - revive
      # Skip errcheck for type assertions in test files
      # Test mocks use `val, _ := args.Get(0).(Type)` with nil guards; safe and idiomatic
      - path: _test\.go
        linters:
          - errcheck
      # Skip dupl for mock files (mocks inherently share patterns)
      # Skip wrapcheck for mock files (mock error returns don't need wrapping)
      - path: mocks_
        linters:
          - dupl
          - wrapcheck
      # Skip dupl for service interface definitions (CRUD interfaces share method signatures by design)
      - path: internal/services/(services|api)\.go
        linters:
          - dupl
      # Skip forbidigo for CLI tools (legitimate user-facing output)
      - path: cmd/
        linters:
          - forbidigo
      # Skip forbidigo for main entry point
      - path: main\.go
        linters:
          - forbidigo
      # Skip forbidigo, gochecknoglobals, and exhaustruct for test files
      # Tests legitimately use partial struct initialization for focused assertions
      - path: _test\.go
        linters:
          - forbidigo
          - gochecknoglobals
          - exhaustruct
          - wrapcheck
      # Skip tagliatelle for external API type files (Storybook camelCase, GitHub ssh_url, etc.)
      - path: internal/storybook/types\.go
        linters:
          - tagliatelle
      - path: internal/codeindex/sync/github\.go
        linters:
          - tagliatelle
      - path: internal/search/search_utils\.go
        linters:
          - tagliatelle
      # Skip tagliatelle for Go acronym ID fields (IDs->ids, AID->a_id, ETag->etag)
      # tagliatelle mis-converts Go acronyms: ResourceIDs expects resource_i_ds not resource_ids
      - path: internal/(services|websocket|journey|models)/
        linters:
          - tagliatelle
      # Skip contextcheck for asyncFireAndForget calls (intentionally detached from request context)
      - text: "asyncFireAndForget"
        linters:
          - contextcheck
      # Skip all linters for generated protobuf files
      - path: \.pb\.go$
        linters:
          - all
      # Skip all linters for generated swagger docs
      - path: docs/
        linters:
          - all
      # Skip all linters for vendor directory
      - path: /vendor/
        linters:
          - all

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - gofumpt
    - gci
  settings:
    gci:
      custom-order: true
      sections:
        - Standard     # Go standard library (fmt, os, etc.)
        - Default      # Third-party packages (github.com, golang.org, etc.)
        - Prefix(github.com/kooshapari/tracertm-backend)  # Local project imports
