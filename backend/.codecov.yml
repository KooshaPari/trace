# CodeCov Configuration for TraceRTM Backend
# https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 90%
        threshold: 1%
        if_ci_failed: error

    patch:
      default:
        target: 90%
        threshold: 1%

    changes:
      default:
        if_ci_failed: error

flags:
  unit:
    paths:
      - tests/
    carryforward: true

  integration:
    paths:
      - tests/integration/
    carryforward: true

  api:
    paths:
      - tests/
    carryforward: true

  security:
    paths:
      - tests/security/
    carryforward: true

  e2e:
    paths:
      - tests/
    carryforward: true

comment:
  layout: "header, diff, flags, files, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: yes

github_checks:
  annotations: true
