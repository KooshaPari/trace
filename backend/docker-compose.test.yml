
services:
  # PostgreSQL 16 with pgvector extension for test database
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: trace-postgres-test
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracertm_test
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracertm_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 7 for test cache
  redis-test:
    image: redis:7-alpine
    container_name: trace-redis-test
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-test-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Neo4j 5 for test graph database
  neo4j-test:
    image: neo4j:5-community
    container_name: trace-neo4j-test
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: neo4j/testpassword
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_heap_max__size: 512M
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-test-data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "testpassword", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # NATS with JetStream for test messaging
  nats-test:
    image: nats:latest
    container_name: trace-nats-test
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP monitoring
      - "6222:6222"  # Cluster connections
    command:
      - "--js"       # Enable JetStream
      - "--sd=/data" # Store directory
    volumes:
      - nats-test-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-test-data:
    driver: local
  redis-test-data:
    driver: local
  nats-test-data:
    driver: local
  neo4j-test-data:
    driver: local

networks:
  default:
    name: tracertm-test-network
