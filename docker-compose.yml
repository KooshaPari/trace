services:
  # Nginx API Gateway
  nginx:
    image: nginx:alpine
    container_name: tracertm-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      go-backend:
        condition: service_healthy
      python-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tracertm
    restart: unless-stopped

  # Nginx Prometheus Exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: tracertm-nginx-exporter
    command:
      - '-nginx.scrape-uri=http://nginx/metrics'
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - tracertm
    restart: unless-stopped

  # Go Backend Service
  go-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracertm-go-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-tracertm}
      - DB_PASSWORD=${DB_PASSWORD:-tracertm_password}
      - DB_NAME=${DB_NAME:-tracertm}
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - PORT=8080
      - GIN_MODE=release
      - PYTHON_BACKEND_URL=http://python-backend:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tracertm
    restart: unless-stopped

  # Python Backend Service
  python-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracertm-python-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-tracertm}:${DB_PASSWORD:-tracertm_password}@postgres:5432/${DB_NAME:-tracertm}
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GO_BACKEND_URL=http://go-backend:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tracertm
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tracertm-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-tracertm}
      POSTGRES_USER: ${DB_USER:-tracertm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tracertm_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tracertm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: tracertm-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-tracertm}:${DB_PASSWORD:-tracertm_password}@postgres:5432/${DB_NAME:-tracertm}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tracertm
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tracertm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: tracertm-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tracertm
    restart: unless-stopped

  # NATS Message Broker
  nats:
    image: nats:latest
    container_name: tracertm-nats
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP management/metrics
      - "6222:6222"  # Cluster connections
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: tracertm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - tracertm
    restart: unless-stopped

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: tracertm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - tracertm
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nats_data:
  prometheus_data:
  grafana_data:
  nginx_cache:
  nginx_logs:

networks:
  tracertm:
    driver: bridge
