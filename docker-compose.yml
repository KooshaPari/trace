version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tracertm-postgres
    environment:
      POSTGRES_DB: tracertm
      POSTGRES_USER: tracertm
      POSTGRES_PASSWORD: tracertm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracertm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tracertm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm-network

  # NATS Message Broker
  nats:
    image: nats:2.10-alpine
    container_name: tracertm-nats
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # HTTP management
      - "6222:6222"  # Cluster connections
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm-network

  # Go Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracertm-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tracertm
      DB_PASSWORD: tracertm_password
      DB_NAME: tracertm
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      PORT: 8080
      GIN_MODE: release
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tracertm-network

  # Python API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracertm-api
    environment:
      DATABASE_URL: postgresql+asyncpg://tracertm:tracertm_password@postgres:5432/tracertm
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      LOG_LEVEL: INFO
      BACKEND_URL: http://backend:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
    command: uvicorn tracertm.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - tracertm-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: tracertm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - tracertm-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: tracertm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - tracertm-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  tracertm-network:
    driver: bridge

