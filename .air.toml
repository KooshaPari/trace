# Root-level Air config: when you run `air` from project root, only watch/build backend.
# This avoids watching ARCHIVE, AGENTS, frontend, etc. (prevents "too many open files").
# See backend/.air.toml for full backend options.

root = "backend"
tmp_dir = "tmp"

[build]
  args_bin = []
  entrypoint = "./tmp/main"
  cmd = "go build -o ./tmp/main ."
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "tests", "scripts", "docs", ".trace", "migrations", "ARCHIVE"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "html"]
  include_file = []
  kill_delay = "0s"
  log = "tmp/build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
