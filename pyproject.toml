[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tracertm"
version = "0.2.0"
description = "Agent-native, multi-view requirements traceability and project management system"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "BMad", email = "bmad@example.com"}
]
keywords = ["requirements", "traceability", "rtm", "project-management", "ai-agents"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
    "Environment :: Console",
    "Intended Audience :: System Administrators",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Topic :: Office/Business",
]

dependencies = [
    # CLI
    "typer>=0.21.1",
    "rich>=14.3.1",

    # Core
    "pydantic>=2.12.5",
    "pydantic-settings>=2.12.0",
    "python-dotenv>=1.2.1",
    "httpx>=0.28.1",
    "pyyaml>=6.0.3",

    # Database & ORM
    "typing_extensions>=4.0.0",
    "sqlalchemy[asyncio]>=2.0.46",
    "alembic>=1.18.3",
    "psycopg2-binary>=2.9.11",
    "aiosqlite>=0.22.1",
    "asyncpg>=0.31.0",
    "greenlet>=3.3.1",

    # Serialization & Encoding
    "msgspec>=0.20.0",
    "msgpack>=1.1.2",
    "markdown>=3.10.1",
    "markdown-it-py>=4.0.0",
    "python-frontmatter>=1.1.0",

    # HTTP & Networking
    "aiohttp>=3.13.3",
    "tenacity>=9.1.2",

    # API / Web
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sse-starlette>=3.0.0",

    # Cache (health, feature flags, cache service)
    "redis>=5.2.0",

    # Async/Concurrency
    "anyio>=4.12.1",

    # File System Watching
    "watchdog>=6.0.0",

    # Logging & Observability
    "loguru>=0.7.3",
    "structlog>=25.5.0",
    "opentelemetry-api>=1.39.1",
    "opentelemetry-sdk>=1.39.1",
    "prometheus-client>=0.24.1",

    # Security & Cryptography
    "cryptography>=46.0.4",
    "bcrypt>=5.0.0",
    "pyjwt>=2.11.0",
    "keyring>=25.7.0",
    "workos>=5.40.0",

    # MCP
    "fastmcp>=3.0.0b1",
    "mcp>=1.26.0",
    "hatchet-sdk>=1.22.13",

    # Messaging & Events
    "nats-py>=2.12.0",
    "nkeys>=0.2.1",

    # Workflow orchestration (API + temporal_worker)
    "temporalio>=1.7.0",
]

