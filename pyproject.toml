    "markdown>=3.10.1",
    "markdown-it-py>=4.0.0",
    "python-frontmatter>=1.1.0",
    "aiohttp>=3.13.3",
    "tenacity>=9.1.2",
    "grpcio>=1.70.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sse-starlette>=3.0.0",
    "redis>=5.2.0",
    "anyio>=4.12.1",
    "watchdog>=6.0.0",
    "loguru>=0.7.3",
    "structlog>=25.5.0",
    "opentelemetry-api>=1.39.1",
    "opentelemetry-sdk>=1.39.1",
