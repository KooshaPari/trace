[project.scripts]
rtm = "tracertm.cli:app"
tracertm = "tracertm.cli:app"
tracertm-mcp = "tracertm.mcp:run_server"
rtm-mcp = "tracertm.mcp:run_server"

[tool.setuptools.packages.find]
where = ["src"]
include = ["tracertm*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-ra",
    "-vv",
    "--strict-markers",
    "--tb=short",
    "-p",
    "asyncio",
]
markers = [
    "unit: Unit tests (fast, no external dependencies)",
    "integration: Integration tests (database, file system)",
    "e2e: End-to-end tests (full CLI workflows)",
    "cli: CLI command tests",
    "slow: Slow tests (>1s execution time)",
    "agent: Agent coordination tests (concurrent operations)",
    "asyncio: Async tests (mark for async tests)",
    "performance: Performance and load tests",
    "property: Property-based tests using Hypothesis",
    "benchmark: Benchmark tests for performance measurement",
    "smoke: Minimal critical-path checks",
    "chaos: Chaos/resilience tests (connection failures, resource exhaustion)",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
    "ignore::pytest.PytestAssertRewriteWarning",
    "ignore::RuntimeWarning",
]

[tool.pytest_asyncio]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
source = ["src/tracertm"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/site-packages/*",
]
branch = true

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 90
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.interrogate]
# Docstring coverage; used by pre-commit and `interrogate` CLI. Keep in sync with .pre-commit-config.yaml.
fail-under = 85
path = ["src/"]
exclude = ["tests", "build", "dist", ".venv"]
ignore-init-module = true
ignore-init-method = true

[tool.bandit]
# Security linter; complements ruff S rules and semgrep. Run: bandit -r src/
exclude_dirs = ["tests", "build", "dist", ".venv", "ARCHIVE"]
skips = ["B101"]  # assert_used: allow in tests (tests excluded); optional in dev
severity = "medium"
confidence = "medium"

[tool.ruff]
line-length = 120
target-version = "py312"
preview = true
# Vendored/archived code: do not lint (gyp, dmg-builder, etc.).
extend-exclude = ["ARCHIVE", "ARCHIVE/**"]
# Skip ARCHIVE even when a file under ARCHIVE is passed directly (e.g. by IDE).
force-exclude = true

[tool.ty]

[tool.ty.src]
# Exclude vendored/archived code, scripts, optional TUI/vault, and tests that use optional deps or conditional types.
exclude = [
    "ARCHIVE",
    "ARCHIVE/**",
    "scripts",
    "scripts/**",
    "src/tracertm/tui",
    "src/tracertm/tui/**",
    "src/tracertm/vault",
    "src/tracertm/vault/**",
    "tests/unit/tui/widgets",
    "tests/unit/validation/test_dataframe_schema_validation.py",
]

# TUI tests: optional textual, conditional apps, mocks → relax type rules (single override for all tests/unit/tui/**).
[[tool.ty.overrides]]
include = ["tests/unit/tui/**"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
possibly-missing-import = "ignore"
possibly-missing-attribute = "ignore"
unresolved-attribute = "ignore"
invalid-assignment = "ignore"
invalid-argument-type = "ignore"
no-matching-overload = "ignore"
redundant-cast = "ignore"

# Component storage: SyncEngine/SyncQueue/SyncStateManager use mocks (MockDBConnection, SimpleNamespace); method shadowing in test_sync_queue.
[[tool.ty.overrides]]
include = [
    "tests/component/storage/test_sync_engine_errors.py",
    "tests/component/storage/test_sync_queue.py",
]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"
invalid-assignment = "ignore"

# Root conftest: optional router/textual imports, Base fallback, router/registry fixtures when module missing.
[[tool.ty.overrides]]
include = ["conftest.py", "tests/conftest.py"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
invalid-assignment = "ignore"
call-non-callable = "ignore"

# E2E and fixtures: project.id/item.id are UUID; service/repo APIs expect str.
[[tool.ty.overrides]]
include = ["tests/e2e/**", "tests/fixtures.py"]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"

# Integration workflows: sync Session passed to ProjectRepository (expects AsyncSession in type hint).
[[tool.ty.overrides]]
include = ["tests/integration/workflows/**"]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"

# MCP tests: optional auth APIs (_build_static_verifier, CompositeTokenVerifier), fastmcp ToolError/parse_scopes; parse_scopes return type.
[[tool.ty.overrides]]
include = ["tests/mcp/**"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
unknown-argument = "ignore"
unresolved-attribute = "ignore"
invalid-argument-type = "ignore"
unsupported-operator = "ignore"

# Performance tests: optional locust/psutil; UUID->str for item_service; result may be None before .id.
[[tool.ty.overrides]]
include = ["tests/performance/**"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
invalid-argument-type = "ignore"
possibly-missing-attribute = "ignore"

# item_specs router: response models (EARSAnalysisResponse, QualityScoreResponse, MerkleProofResponse, VersionChainResponse, ContentAddressResponse, etc.) and router construction are out of sync; optional request bodies; redundant cast for adjacency/item_metadata.
[[tool.ty.overrides]]
include = ["src/tracertm/api/routers/item_specs.py"]
[tool.ty.overrides.rules]
missing-argument = "ignore"
unknown-argument = "ignore"
invalid-argument-type = "ignore"
invalid-parameter-default = "ignore"
invalid-return-type = "ignore"
redundant-cast = "ignore"

# Proto: generated pb2 message types (EntityRequest, etc.), grpc.experimental.
[[tool.ty.overrides]]
include = ["src/tracertm/proto/**"]
[tool.ty.overrides.rules]
unresolved-attribute = "ignore"
