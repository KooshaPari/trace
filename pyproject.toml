    "cryptography>=46.0.4",
    "bcrypt>=5.0.0",
    "pyjwt>=2.11.0",
    "authlib>=1.6.6",
    "pycasbin>=2.7.1",
    "ray>=2.53.0",
    "dask>=2026.1.2",
    "polars>=1.37.1",
