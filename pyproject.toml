[project.scripts]
rtm = "tracertm.cli:app"
tracertm = "tracertm.cli:app"
tracertm-mcp = "tracertm.mcp:run_server"
rtm-mcp = "tracertm.mcp:run_server"

[tool.setuptools.packages.find]
where = ["src"]
include = ["tracertm*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-ra",
    "-vv",
    "--strict-markers",
    "--tb=short",
    "-p",
    "asyncio",
]
markers = [
    "unit: Unit tests (fast, no external dependencies)",
    "integration: Integration tests (database, file system)",
    "e2e: End-to-end tests (full CLI workflows)",
    "cli: CLI command tests",
    "slow: Slow tests (>1s execution time)",
    "agent: Agent coordination tests (concurrent operations)",
    "asyncio: Async tests (mark for async tests)",
    "performance: Performance and load tests",
    "property: Property-based tests using Hypothesis",
    "benchmark: Benchmark tests for performance measurement",
    "smoke: Minimal critical-path checks",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
    "ignore::pytest.PytestAssertRewriteWarning",
    "ignore::RuntimeWarning",
]

[tool.pytest_asyncio]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
source = ["src/tracertm"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/site-packages/*",
]
branch = true

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 90
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.interrogate]
# Docstring coverage; used by pre-commit and `interrogate` CLI. Keep in sync with .pre-commit-config.yaml.
fail-under = 80
path = ["src/"]
exclude = ["tests", "build", "dist", ".venv"]
ignore-init-module = true
ignore-init-method = true

[tool.ruff]
line-length = 120
target-version = "py312"
preview = true

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "PT",   # flake8-pytest-style
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
    "SIM105", # use contextlib.suppress
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/*" = ["B011", "SIM105"]
"conftest.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["tracertm"]
known-third-party = ["typer", "rich", "sqlalchemy", "pydantic"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "yaml.*",
    "loguru.*",
    "sqlalchemy.*",
    "pytest.*",
    "rich.*",
    "typer.*",
    "factory.*",
    "alembic.*",
    "uvicorn.*",
    "redis.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "tracertm.services.tui_service",
    "tracertm.services.plugin_service",
    "tracertm.services.external_integration_service",
    "tracertm.services.documentation_service",
    "tracertm.services.api_webhooks_service",
    "tracertm.config.manager",
    "tracertm.core.concurrency",
    "tracertm.services.security_compliance_service",
    "tracertm.database.connection",
    "tracertm.config.settings",
    "tracertm.cli.commands.benchmark",
    "tracertm.cli.commands.backup",
    "tracertm.logging_config",
    "tracertm.repositories.*",
    "tracertm.testing_factories",
    "tracertm.services.traceability_matrix_service",
    "tracertm.services.shortest_path_service",
    "tracertm.services.performance_service",
    "tracertm.services.impact_analysis_service",
    "tracertm.services.export_service",
    "tracertm.services.export_import_service",
    "tracertm.services.cycle_detection_service",
    "tracertm.services.critical_path_service",
    "tracertm.services.advanced_traceability_enhancements_service",
    "tracertm.services.item_service",
    "tracertm.services.event_sourcing_service",
    "tracertm.services.commit_linking_service",
    "tracertm.services.chaos_mode_service",
    "tracertm.services.agent_performance_service",
    "tracertm.services.advanced_analytics_service",
]
ignore_errors = true

[tool.basedpyright]
# Ultra-strict type checking (stricter than mypy)
typeCheckingMode = "strict"
pythonVersion = "3.12"
pythonPlatform = "Linux"
reportUnusedVariable = "error"
reportUnusedImport = "error"
reportUnusedClass = "error"
reportUnusedFunction = "error"
reportUnusedParameter = "error"
reportDuplicateImport = "error"
reportPrivateUsage = "error"
reportConstantRedefinition = "error"
reportInvalidTypeForm = "error"
reportUnnecessaryIsInstance = "error"
reportUnnecessaryCast = "error"
reportUnnecessaryComparison = "error"
reportUnnecessaryContains = "error"
reportAssignmentType = "error"
reportAttributeAccessIssue = "error"
reportCallIssue = "error"
reportIndexIssue = "error"
reportIncompatibleMethodOverride = "error"
reportIncompatibleVariableOverride = "error"
reportInconsistentConstructor = "error"
reportInconsistentMethodOverride = "error"
reportInvalidStringEscapeSequence = "error"
reportMissingTypeArguments = "error"
reportMissingTypeStubs = "warning"
reportOptionalSubscript = "error"
reportOptionalMemberAccess = "error"
reportOptionalCall = "error"
reportOptionalIterable = "error"
reportOptionalContextManager = "error"
reportOptionalOperand = "error"
reportTypedDictNotRequiredAccess = "error"
reportUnknownParameterType = "error"
reportUnknownArgumentType = "error"
reportUnknownLambdaType = "error"
reportUnknownVariableType = "error"
reportUnknownMemberType = "error"
reportUnknownFunctionMemberType = "error"
reportUnknownClassMemberType = "error"
reportGeneralTypeIssues = "error"
reportUntypedBaseClass = "error"
reportUntypedFunctionDecorator = "error"
reportUntypedClassDecorator = "error"
reportUntypedNamedTuple = "error"
reportPrivateImportUsage = "error"
reportInvalidTypeVarUse = "error"
reportMatchNotExhaustive = "error"
reportSelfClsParameterName = "error"
reportIncompatibleImportOverrides = "error"
reportImplicitStringConcatenation = "warning"
exclude = ["**/node_modules", "**/__pycache__", ".venv", "venv"]
include = ["src"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
    "pytest-xdist>=3.8.0",
    "pytest-benchmark>=5.2.3",
    "hypothesis>=6.151.4",
    "faker>=40.1.2",
    "factory-boy>=3.3.3",
    "ruff>=0.14.14",
    "mypy>=1.19.1",
]

[tool.uv]
managed = true

[tool.hatch.build.targets.wheel]
packages = ["src/tracertm"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/docs",
    "/pyproject.toml",
    "/README.md",
]

[tool.poe.tasks]
# Format code
format = "ruff format ."

# Lint with auto-fix
lint = "ruff check --fix ."

# Type checking with mypy
type-check = "mypy src/"

# Ultra-strict type checking with basedpyright
type-check-strict = "basedpyright src/"

# Architecture analysis with tach
arch-check = "tach check"

# Architecture visualization
arch-show = "tach show"

# Security scanning (install semgrep via brew: brew install semgrep)
security = "semgrep --config=p/security-audit src/"

# Run all quality checks
quality = [
    { cmd = "ruff format ." },
    { cmd = "ruff check --fix ." },
    { cmd = "mypy src/" },
    { cmd = "basedpyright src/" },
    { cmd = "tach check" },
]

# Run tests
test = "pytest"

# Run tests with coverage
test-cov = "pytest --cov=src/tracertm --cov-report=html"

# Run tests in parallel
test-parallel = "pytest -n auto"

# Run specific test marker
test-unit = "pytest -m unit"
test-integration = "pytest -m integration"

# Full pipeline
all = [
    { cmd = "ruff format ." },
    { cmd = "ruff check --fix ." },
    { cmd = "mypy src/" },
    { cmd = "basedpyright src/" },
    { cmd = "tach check" },
    { cmd = "semgrep --config=p/security-audit src/" },
    { cmd = "pytest --cov=src/tracertm" },
]
