dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
    "pytest-xdist>=3.8.0",
    "pytest-benchmark>=5.2.3",
    "hypothesis>=6.151.4",
    "faker>=40.1.2",
    "factory-boy>=3.3.3",
    "ruff>=0.14.14",
    "ty>=0.0.2",
    "vulture>=2.14",
    "radon>=6.0.1",
    "interrogate>=1.7.0",
]

[tool.uv]
managed = true

[tool.hatch.build.targets.wheel]
packages = ["src/tracertm"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/docs",
    "/pyproject.toml",
    "/README.md",
]

[tool.poe.tasks]
# Format code
format = { shell = "ruff format . && ruff check --fix . && ty check src/" }

# Check code
check = { shell = "ruff check . && ty check src/" }

# Code metrics
metrics = { shell = "vulture src/ && radon cc src/ -a -s && radon mi src/ -s" }

# Lint with auto-fix
lint = "ruff check --fix ."

# Type checking with ty
type-check = "ty check src/"

# Architecture analysis with tach
arch-check = "tach check"

# Architecture visualization
arch-show = "tach show"

# Security scanning (install semgrep via brew: brew install semgrep)
security = "semgrep --config=p/security-audit src/"

# Bandit (Python security linter)
bandit = "bandit -r src/"

# Dependency vulnerability check (PyPI advisory DB)
pip-audit = "pip-audit"

# Run all quality checks
quality = [
    { ref = "format" },
    { ref = "metrics" },
    { ref = "arch-check" },
    { ref = "bandit" },
    { ref = "pip-audit" },
    { ref = "security" },
    { ref = "test" },
]

# Run tests
test = "pytest"

# Run tests with coverage
test-cov = "pytest --cov=src/tracertm --cov-report=html"

# Run tests in parallel
test-parallel = "pytest -n auto"

# Run specific test marker
test-unit = "pytest -m unit"
test-integration = "pytest -m integration"

# Full pipeline
all = [
    { ref = "quality" },
    { ref = "test-cov" },
]
