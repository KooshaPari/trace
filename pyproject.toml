[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tracertm"
version = "0.1.0"
description = "Agent-native, multi-view requirements traceability and project management system"
readme = "README.md"
requires-python = ">=3.12"
license = {text = "MIT"}
authors = [
    {name = "BMad", email = "bmad@example.com"}
]
keywords = ["requirements", "traceability", "rtm", "project-management", "ai-agents"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Quality Assurance",
    "Environment :: Console",
    "Intended Audience :: System Administrators",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Topic :: Office/Business",
]

dependencies = [
    # CLI & Terminal
    "typer[all]>=0.12.0",
    "rich>=14.0.0",
    "textual>=0.80.0",

    # Database & ORM
    "sqlalchemy[asyncio]>=2.0.44",
    "alembic>=1.17.0",
    "psycopg2-binary>=2.9.11",
    "aiosqlite>=0.21.0",
    "asyncpg>=0.29.0",
    "greenlet>=3.2.0",

    # Data Validation & Configuration
    "pydantic>=2.12.0",
    "pydantic-settings>=2.3.0",
    "python-dotenv>=1.0.0",

    # Serialization & Encoding
    "pyyaml>=6.0.1",
    "msgspec>=0.18.0",
    "msgpack>=1.0.5",
    "markdown>=3.7.0",
    "markdown-it-py>=3.0.0",
    "python-frontmatter>=1.1.0",

    # HTTP & Networking (modern async-first)
    "httpx>=0.28.1",
    "aiohttp>=3.8.0",

    # Async/Concurrency (better abstractions)
    "anyio>=4.0.0",

    # File System Watching
    "watchdog>=5.0.0",

    # Logging & Observability
    "loguru>=0.7.0",
    "structlog>=24.1.0",
    "opentelemetry-api>=1.24.0",
    "opentelemetry-sdk>=1.24.0",
    "prometheus-client>=0.20.0",

    # Security & Cryptography
    "cryptography>=41.0.0",
    "bcrypt>=4.1.0",
    "pyjwt>=2.10.0",
    "keyring>=24.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.0",
    "pytest-xdist>=3.8.0",
    "pytest-benchmark>=5.2.0",
    "hypothesis>=6.148.0",
    "faker>=38.0.0",
    "factory-boy>=3.3.0",
    "ruff>=0.14.0",
    "mypy>=1.18.0",
    "basedpyright>=1.1.0",
    "poethepoet>=0.27.0",
    "tach>=0.15.0",
    "pandera>=0.20.0",
    "loguru>=0.7.0",
    "pre-commit>=3.6.0",
    "semgrep>=1.45.0",
]
lint = [
    "ruff>=0.14.0",
    "mypy>=1.18.0",
    "basedpyright>=1.1.0",
]
test = [
    "pytest>=9.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.0",
    "pytest-xdist>=3.8.0",
    "pytest-benchmark>=5.2.0",
    "hypothesis>=6.148.0",
    "faker>=38.0.0",
    "factory-boy>=3.3.0",
]
phase2 = [
    "basedpyright>=1.1.0",
    "poethepoet>=0.27.0",
    "tach>=0.15.0",
    "pandera>=0.20.0",
    "loguru>=0.7.0",
    "pre-commit>=3.6.0",
    "semgrep>=1.45.0",
]
phase3 = [
    "hypothesis>=6.148.0",
    "pydantic-factories>=1.4.0",
]
observability = [
    "opentelemetry-api>=1.24.0",
    "opentelemetry-sdk>=1.24.0",
    "opentelemetry-exporter-prometheus>=0.45b0",
    "prometheus-client>=0.20.0",
    "structlog>=24.1.0",
]
security = [
    "cryptography>=41.0.0",
    "bcrypt>=4.1.0",
    "pyjwt>=2.10.0",
    "authlib>=1.3.0",
    "pycasbin>=1.35.0",
]
distributed = [
    "ray>=2.30.0",
    "dask>=2024.1.0",
]
data = [
    "polars>=0.20.0",
    "duckdb>=0.9.0",
    "ibis-framework>=8.0.0",
]
all = [
    "basedpyright>=1.1.0",
    "poethepoet>=0.27.0",
    "tach>=0.15.0",
    "pandera>=0.20.0",
    "loguru>=0.7.0",
    "pre-commit>=3.6.0",
    "semgrep>=1.45.0",
    "hypothesis>=6.148.0",
    "pydantic-factories>=1.4.0",
    "opentelemetry-api>=1.24.0",
    "opentelemetry-sdk>=1.24.0",
    "prometheus-client>=0.20.0",
    "structlog>=24.1.0",
    "cryptography>=41.0.0",
    "bcrypt>=4.1.0",
    "pyjwt>=2.10.0",
    "authlib>=1.3.0",
    "pycasbin>=1.35.0",
    "ray>=2.30.0",
    "dask>=2024.1.0",
    "polars>=0.20.0",
    "duckdb>=0.9.0",
    "ibis-framework>=8.0.0",
]

[project.scripts]
rtm = "tracertm.cli:app"
tracertm = "tracertm.cli:app"

[tool.setuptools.packages.find]
where = ["src"]
include = ["tracertm*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-ra",
    "-vv",
    "--strict-markers",
    "--tb=short",
    "-p",
    "asyncio",
]
markers = [
    "unit: Unit tests (fast, no external dependencies)",
    "integration: Integration tests (database, file system)",
    "e2e: End-to-end tests (full CLI workflows)",
    "cli: CLI command tests",
    "slow: Slow tests (>1s execution time)",
    "agent: Agent coordination tests (concurrent operations)",
    "asyncio: Async tests (mark for async tests)",
    "performance: Performance and load tests",
    "property: Property-based tests using Hypothesis",
    "benchmark: Benchmark tests for performance measurement",
    "smoke: Minimal critical-path checks",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
    "ignore::pytest.PytestAssertRewriteWarning",
    "ignore::RuntimeWarning",
]

[tool.pytest_asyncio]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
source = ["src/tracertm"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/site-packages/*",
]
branch = true

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.ruff]
line-length = 120
target-version = "py312"
preview = true

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "PT",   # flake8-pytest-style
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
    "SIM105", # use contextlib.suppress
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401", "F403"]
"tests/*" = ["B011", "SIM105"]
"conftest.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["tracertm"]
known-third-party = ["typer", "rich", "sqlalchemy", "pydantic"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.basedpyright]
# Ultra-strict type checking (stricter than mypy)
typeCheckingMode = "strict"
pythonVersion = "3.12"
pythonPlatform = "Linux"
reportUnusedVariable = "error"
reportUnusedImport = "error"
reportUnusedClass = "error"
reportUnusedFunction = "error"
reportUnusedParameter = "error"
reportDuplicateImport = "error"
reportPrivateUsage = "error"
reportConstantRedefinition = "error"
reportInvalidTypeForm = "error"
reportUnnecessaryIsInstance = "error"
reportUnnecessaryCast = "error"
reportUnnecessaryComparison = "error"
reportUnnecessaryContains = "error"
reportAssignmentType = "error"
reportAttributeAccessIssue = "error"
reportCallIssue = "error"
reportIndexIssue = "error"
reportIncompatibleMethodOverride = "error"
reportIncompatibleVariableOverride = "error"
reportInconsistentConstructor = "error"
reportInconsistentMethodOverride = "error"
reportInvalidStringEscapeSequence = "error"
reportMissingTypeArguments = "error"
reportMissingTypeStubs = "warning"
reportOptionalSubscript = "error"
reportOptionalMemberAccess = "error"
reportOptionalCall = "error"
reportOptionalIterable = "error"
reportOptionalContextManager = "error"
reportOptionalOperand = "error"
reportTypedDictNotRequiredAccess = "error"
reportUnknownParameterType = "error"
reportUnknownArgumentType = "error"
reportUnknownLambdaType = "error"
reportUnknownVariableType = "error"
reportUnknownMemberType = "error"
reportUnknownFunctionMemberType = "error"
reportUnknownClassMemberType = "error"
reportGeneralTypeIssues = "error"
reportUntypedBaseClass = "error"
reportUntypedFunctionDecorator = "error"
reportUntypedClassDecorator = "error"
reportUntypedNamedTuple = "error"
reportPrivateImportUsage = "error"
reportInvalidTypeVarUse = "error"
reportMatchNotExhaustive = "error"
reportSelfClsParameterName = "error"
reportIncompatibleImportOverrides = "error"
reportImplicitStringConcatenation = "warning"
exclude = ["**/node_modules", "**/__pycache__", ".venv", "venv"]
include = ["src"]

[tool.uv]
# UV package manager configuration
managed = true
dev-dependencies = [
    "pytest>=9.0.0",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.0",
    "pytest-xdist>=3.8.0",
    "pytest-benchmark>=5.2.0",
    "hypothesis>=6.148.0",
    "faker>=38.0.0",
    "factory-boy>=3.3.0",
    "ruff>=0.14.0",
    "mypy>=1.18.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/tracertm"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/docs",
    "/pyproject.toml",
    "/README.md",
]

[tool.poe.tasks]
# Format code
format = "ruff format ."

# Lint with auto-fix
lint = "ruff check --fix ."

# Type checking with mypy
type-check = "mypy src/"

# Ultra-strict type checking with basedpyright
type-check-strict = "basedpyright src/"

# Architecture analysis with tach
arch-check = "tach check"

# Architecture visualization
arch-show = "tach show"

# Security scanning with semgrep
security = "semgrep --config=p/security-audit src/"

# Run all quality checks
quality = [
    { cmd = "ruff format ." },
    { cmd = "ruff check --fix ." },
    { cmd = "mypy src/" },
    { cmd = "basedpyright src/" },
    { cmd = "tach check" },
]

# Run tests
test = "pytest"

# Run tests with coverage
test-cov = "pytest --cov=src/tracertm --cov-report=html"

# Run tests in parallel
test-parallel = "pytest -n auto"

# Run specific test marker
test-unit = "pytest -m unit"
test-integration = "pytest -m integration"

# Full pipeline
all = [
    { cmd = "ruff format ." },
    { cmd = "ruff check --fix ." },
    { cmd = "mypy src/" },
    { cmd = "basedpyright src/" },
    { cmd = "tach check" },
    { cmd = "semgrep --config=p/security-audit src/" },
    { cmd = "pytest --cov=src/tracertm" },
]
