[project.scripts]
rtm = "tracertm.cli:app"
tracertm = "tracertm.cli:app"
tracertm-mcp = "tracertm.mcp:run_server"
rtm-mcp = "tracertm.mcp:run_server"

[tool.setuptools.packages.find]
where = [
    "src",
]
include = [
    "tracertm*",
]

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
    "*_test.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = [
    "-ra",
    "-vv",
    "--strict-markers",
    "--tb=short",
    "-p",
    "asyncio",
]
markers = [
    "unit: Unit tests (fast, no external dependencies)",
    "integration: Integration tests (database, file system)",
    "e2e: End-to-end tests (full CLI workflows)",
    "cli: CLI command tests",
    "slow: Slow tests (>1s execution time)",
    "agent: Agent coordination tests (concurrent operations)",
    "asyncio: Async tests (mark for async tests)",
    "performance: Performance and load tests",
    "property: Property-based tests using Hypothesis",
    "benchmark: Benchmark tests for performance measurement",
    "smoke: Minimal critical-path checks",
    "chaos: Chaos/resilience tests (connection failures, resource exhaustion)",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
    "ignore::pytest.PytestAssertRewriteWarning",
    "ignore::RuntimeWarning",
]

[tool.pytest_asyncio]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
source = [
    "src/tracertm",
]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/site-packages/*",
]
branch = true

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 90
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "except (ImportError|Exception|ModuleNotFoundError).*:",
    "except ImportError:",
    "except Exception:.*# (test )?fallback",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.interrogate]
fail-under = 85
path = [
    "src/",
]
exclude = [
    "tests",
    "build",
    "dist",
    ".venv",
]
ignore-init-module = true
ignore-init-method = true

[tool.bandit]
exclude_dirs = [
    "tests",
    "build",
    "dist",
    ".venv",
    "ARCHIVE",
]
skips = [
    "B101",
]
severity = "medium"
confidence = "medium"

[tool.ruff]
line-length = 100
target-version = "py312"
preview = true
extend-exclude = [
    "ARCHIVE",
    "ARCHIVE/**",
    "cairosvg",
    "default",
    "temp",
    "temp/**",
]
force-exclude = true

