[tool.ruff.lint.isort]
known-first-party = ["tracertm"]
known-third-party = ["typer", "rich", "sqlalchemy", "pydantic"]

[tool.ruff.format]
# Strict format: double quotes, 4-space indent, trailing commas, final newline, docstring code format
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_calls = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
strict_concatenation = true
ignore_missing_imports = true
show_error_codes = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "yaml.*",
    "loguru.*",
    "sqlalchemy.*",
    "pytest.*",
    "rich.*",
    "typer.*",
    "factory.*",
    "alembic.*",
    "uvicorn.*",
    "redis.*",
]
ignore_missing_imports = true

# Generated proto/grpc code: untyped; do not require strict typing.
[[tool.mypy.overrides]]
module = "tracertm.proto.proto"
ignore_errors = true

# Target: reduce incrementally; remove one module at a time, fix types, then remove from list.
# No ignore_errors for application code long-term; keep only for third-party or generated.
[[tool.mypy.overrides]]
module = [
    "tracertm.*",
    "tracertm.api.main",
    "tracertm.api.client",
    "tracertm.api.routers.*",
    "tracertm.mcp.*",
