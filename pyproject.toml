[tool.ruff.lint]
# Strict profile: E/W/F/I/B/C4/UP/N/PT/SIM/RUF + RSE/PERF/LOG/S + ASYNC/PIE/RET/PTH + DTZ/FA/Q (strict best practices)
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "PT",   # flake8-pytest-style
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
    "RSE",  # raise (RSE1xx)
    "PERF", # performance (PERF1xx)
    "LOG",  # logging (LOG0xx)
    "S",    # flake8-bandit / security (S1xx, S2xx, ...)
    "ASYNC", # flake8-async (async/await best practices)
    "PIE",  # flake8-pie (unnecessary pass, spread, etc.)
    "RET",  # flake8-return (explicit return, superfluous else)
    "PTH",  # flake8-use-pathlib (pathlib over os.path)
    "DTZ",  # flake8-datetimez (zoneinfo / datetime.UTC)
    "FA",   # flake8-future-annotations (from __future__ import annotations)
    "Q",    # flake8-quotes (align with format quote-style)
    "C90",  # McCabe complexity
    "PLR0911",  # too-many-return-statements
    "PLR0912",  # too-many-branches
    "PLR0913",  # too-many-arguments
    "PLR0915",  # too-many-statements
    "PLR1702",  # too-many-nested-blocks
    "PLR2004",  # magic-value-comparison
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "SIM105", # use contextlib.suppress
]

[tool.ruff.lint.mccabe]
max-complexity = 7

[tool.ruff.lint.pylint]
max-args = 5
max-branches = 12
max-returns = 6
max-statements = 50

