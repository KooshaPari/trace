[tool.importlinter]
root_packages = [
    "tracertm",
]

[[tool.importlinter.contracts]]
name = "Core layered architecture"
type = "layers"
layers = [
    "config",
    "db",
    "models",
    "repositories",
    "storage",
    "clients",
    "services",
    "api",
]
containers = [
    "tracertm",
]

[[tool.importlinter.contracts]]
name = "API must not access lower layers directly"
type = "forbidden"
source_modules = [
    "tracertm.api",
]
forbidden_modules = [
    "tracertm.db",
    "tracertm.models",
    "tracertm.repositories",
    "tracertm.storage",
    "tracertm.clients",
]

[tool.uv]
managed = true

[tool.hatch.build.targets.wheel]
packages = [
    "src/tracertm",
]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/docs",
    "/pyproject.toml",
    "/README.md",
]

[tool.poe.tasks]
lint = "ruff check --fix ."
type-check = "ty check src/"
arch-check = "tach check"
arch-show = "tach show"
security = "semgrep --config=p/security-audit src/"
bandit = "bandit -r src/"
pip-audit = "pip-audit"
quality = [
    { ref = "format" },
    { ref = "metrics" },
    { ref = "arch-check" },
    { ref = "bandit" },
    { ref = "pip-audit" },
    { ref = "security" },
    { ref = "test" },
]
test = "pytest"
test-cov = "pytest --cov=src/tracertm --cov-report=html"
test-parallel = "pytest -n auto"
test-unit = "pytest -m unit"
test-integration = "pytest -m integration"
all = [
    { ref = "quality" },
    { ref = "test-cov" },
]

[tool.poe.tasks.format]
shell = "ruff format . && ruff check --fix . && ty check src/"

[tool.poe.tasks.check]
shell = "ruff check . && ty check src/"

[tool.poe.tasks.metrics]
shell = "vulture src/ && radon cc src/ -a -s && radon mi src/ -s"

