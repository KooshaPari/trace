    "loguru>=0.7.3",
    "pre-commit>=4.5.1",
    "hypothesis>=6.151.4",
    "pydantic-factories>=1.17.3",
    "opentelemetry-api>=1.39.1",
    "opentelemetry-sdk>=1.39.1",
    "prometheus-client>=0.24.1",
    "structlog>=25.5.0",
    "cryptography>=46.0.4",
    "bcrypt>=5.0.0",
