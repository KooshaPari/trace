    "ty>=0.0.2",
    "bandit[toml]>=1.7.10",
    "pip-audit>=2.7.4",
    "import-linter>=2.4.1",
]
test = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
    "pytest-xdist>=3.8.0",
    "pytest-benchmark>=5.2.3",
    "hypothesis>=6.151.4",
    "faker>=40.1.2",
    "factory-boy>=3.3.3",
]
phase2 = [
    "poethepoet>=0.40.0",
    "tach>=0.33.2",
    "pandera>=0.29.0",
    "loguru>=0.7.3",
    "pre-commit>=4.5.1",
]
phase3 = [
    "hypothesis>=6.151.4",
    "pydantic-factories>=1.17.3",
]
observability = [
    "opentelemetry-api>=1.39.1",
    "opentelemetry-sdk>=1.39.1",
    "opentelemetry-exporter-prometheus>=0.60b1",
    "opentelemetry-exporter-otlp-proto-grpc>=1.39.1",
    "opentelemetry-instrumentation-fastapi>=0.52b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.52b0",
    "opentelemetry-instrumentation-httpx>=0.52b0",
    "opentelemetry-instrumentation-requests>=0.52b0",
    "opentelemetry-instrumentation-redis>=0.52b0",
    "prometheus-client>=0.24.1",
    "structlog>=25.5.0",
]
security = [
    "cryptography>=46.0.4",
    "bcrypt>=5.0.0",
    "pyjwt>=2.11.0",
    "authlib>=1.6.6",
    "pycasbin>=2.7.1",
]
distributed = [
    "ray>=2.53.0",
    "dask>=2026.1.2",
]
data = [
    "polars>=1.37.1",
    "duckdb>=1.5.0.dev228",
    "ibis-framework>=11.0.1.dev110",
]
ai = [
    "anthropic>=0.77.0",
    # Future: "openai>=1.50.0",
    # Future: "google-generativeai>=0.8.0",
]
ml = [
    "sentence-transformers>=5.2.2",
    "numpy>=2.4.1",
    "torch>=2.10.0",
]
all = [
    "poethepoet>=0.40.0",
    "tach>=0.33.2",
    "pandera>=0.29.0",
    "import-linter>=2.4.1",
    "loguru>=0.7.3",
    "pre-commit>=4.5.1",
    "hypothesis>=6.151.4",
    "pydantic-factories>=1.17.3",
    "opentelemetry-api>=1.39.1",
    "opentelemetry-sdk>=1.39.1",
    "prometheus-client>=0.24.1",
    "structlog>=25.5.0",
    "cryptography>=46.0.4",
    "bcrypt>=5.0.0",
    "pyjwt>=2.11.0",
    "authlib>=1.6.6",
    "pycasbin>=2.7.1",
    "ray>=2.53.0",
    "dask>=2026.1.2",
    "polars>=1.37.1",
    "duckdb>=1.5.0.dev228",
    "ibis-framework>=11.0.1.dev110",
    "anthropic>=0.77.0",
    "sentence-transformers>=5.2.2",
    "numpy>=2.4.1",
    "vulture>=2.14",
    "radon>=6.0.1",
]

[project.scripts]
rtm = "tracertm.cli:app"
tracertm = "tracertm.cli:app"
tracertm-mcp = "tracertm.mcp:run_server"
rtm-mcp = "tracertm.mcp:run_server"

[tool.setuptools.packages.find]
where = ["src"]
include = ["tracertm*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-ra",
    "-vv",
    "--strict-markers",
    "--tb=short",
    "-p",
    "asyncio",
]
markers = [
    "unit: Unit tests (fast, no external dependencies)",
    "integration: Integration tests (database, file system)",
    "e2e: End-to-end tests (full CLI workflows)",
    "cli: CLI command tests",
    "slow: Slow tests (>1s execution time)",
    "agent: Agent coordination tests (concurrent operations)",
    "asyncio: Async tests (mark for async tests)",
    "performance: Performance and load tests",
    "property: Property-based tests using Hypothesis",
    "benchmark: Benchmark tests for performance measurement",
    "smoke: Minimal critical-path checks",
    "chaos: Chaos/resilience tests (connection failures, resource exhaustion)",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
    "ignore::pytest.PytestAssertRewriteWarning",
    "ignore::RuntimeWarning",
]

[tool.pytest_asyncio]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
source = ["src/tracertm"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/site-packages/*",
]
branch = true

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 90
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
    "except (ImportError|Exception|ModuleNotFoundError).*:",
    "except ImportError:",
    "except Exception:.*# (test )?fallback",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.interrogate]
# Docstring coverage; used by pre-commit and `interrogate` CLI. Keep in sync with .pre-commit-config.yaml.
fail-under = 85
path = ["src/"]
exclude = ["tests", "build", "dist", ".venv"]
ignore-init-module = true
ignore-init-method = true

[tool.bandit]
# Security linter; complements ruff S rules and semgrep. Run: bandit -r src/
exclude_dirs = ["tests", "build", "dist", ".venv", "ARCHIVE"]
skips = ["B101"]  # assert_used: allow in tests (tests excluded); optional in dev
severity = "medium"
confidence = "medium"

[tool.ruff]
# Ruff output format: use --output-format=grouped for file-grouped output
# This groups issues by file for easy processing by agents (easier to fix)
line-length = 100
target-version = "py312"
preview = true
# Vendored/archived/third-party code: do not lint.
extend-exclude = ["ARCHIVE", "ARCHIVE/**", "cairosvg", "default"]
# Skip ARCHIVE even when a file under ARCHIVE is passed directly (e.g. by IDE).
force-exclude = true

[tool.ty]

[tool.ty.src]
# Exclude vendored/archived code, scripts, optional TUI/vault, and tests that use optional deps or conditional types.
include = ["src", "tests"]
exclude = [
    "ARCHIVE",
    "ARCHIVE/**",
    "ARCHIVE/CONFIG/default",
    "backend/tests",
    "cli",
    "cli/tests",
    "frontend/disable",
    "scripts",
    "scripts/**",
    "src/tracertm/vault",
    "src/tracertm/vault/**",
    "tests/unit/validation/test_dataframe_schema_validation.py",
]
respect-ignore-files = true

# Component storage: SyncEngine/SyncQueue/SyncStateManager use mocks (MockDBConnection, SimpleNamespace); method shadowing in test_sync_queue.
[[tool.ty.overrides]]
include = [
    "tests/component/storage/test_sync_engine_errors.py",
    "tests/component/storage/test_sync_queue.py",
]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"
invalid-assignment = "ignore"

# Root conftest: optional router/textual imports, Base fallback, router/registry fixtures when module missing.
[[tool.ty.overrides]]
include = ["conftest.py", "tests/conftest.py"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
invalid-assignment = "ignore"
call-non-callable = "ignore"

# E2E and fixtures: project.id/item.id are UUID; service/repo APIs expect str.
[[tool.ty.overrides]]
include = ["tests/e2e/**", "tests/fixtures.py"]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"

# Integration workflows: sync Session passed to ProjectRepository (expects AsyncSession in type hint).
[[tool.ty.overrides]]
include = ["tests/integration/workflows/**"]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"

# MCP tests: optional auth APIs (_build_static_verifier, CompositeTokenVerifier), fastmcp ToolError/parse_scopes; parse_scopes return type.
[[tool.ty.overrides]]
include = ["tests/mcp/**"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
unknown-argument = "ignore"
unresolved-attribute = "ignore"
invalid-argument-type = "ignore"
unsupported-operator = "ignore"

# Performance tests: optional locust/psutil; UUID->str for item_service; result may be None before .id.
[[tool.ty.overrides]]
include = ["tests/performance/**"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
invalid-argument-type = "ignore"
possibly-missing-attribute = "ignore"

# item_specs router: response models (EARSAnalysisResponse, QualityScoreResponse, MerkleProofResponse, VersionChainResponse, ContentAddressResponse, etc.) and router construction are out of sync; optional request bodies; redundant cast for adjacency/item_metadata.
[[tool.ty.overrides]]
include = ["src/tracertm/api/routers/item_specs.py"]
[tool.ty.overrides.rules]
missing-argument = "ignore"
unknown-argument = "ignore"
invalid-argument-type = "ignore"
invalid-parameter-default = "ignore"
invalid-return-type = "ignore"
redundant-cast = "ignore"

# API main router: complex runtime validation and dynamic payloads.
[[tool.ty.overrides]]
include = ["src/tracertm/api/main.py"]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"
no-matching-overload = "ignore"
unresolved-attribute = "ignore"
possibly-missing-attribute = "ignore"
invalid-assignment = "ignore"

# GitHub handlers: repository interfaces and webhook models are dynamically typed.
[[tool.ty.overrides]]
include = ["src/tracertm/api/handlers/github.py"]
[tool.ty.overrides.rules]
unresolved-attribute = "ignore"

# Integrations router: mixed Any payloads and dynamic repo payloads.
[[tool.ty.overrides]]
include = ["src/tracertm/api/routers/integrations.py"]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"
possibly-missing-attribute = "ignore"

# Items router: Pydantic model overloads and typed generics are out of sync.
[[tool.ty.overrides]]
include = ["src/tracertm/api/routers/items.py"]
[tool.ty.overrides.rules]
no-matching-overload = "ignore"

# Proto: generated pb2 message types (EntityRequest, etc.), grpc.experimental.
[[tool.ty.overrides]]
include = ["src/tracertm/proto/**"]
[tool.ty.overrides.rules]
unresolved-attribute = "ignore"
no-matching-overload = "ignore"

# Vault: optional hvac.
[[tool.ty.overrides]]
include = ["src/tracertm/vault/**"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"

# MCP: Link.source_item/target_item (relationship names), get_status/callable, Project.deleted_at, TokenInfo.scopes, config_dict/SamplingMessage/_call_tool kwargs, traceability item/matrix/impact, ImpactAnalysisService signatures, backup_data["tables"]; cast(Any, getattr(...)) redundant-cast.
[[tool.ty.overrides]]
include = ["src/tracertm/mcp/**", "tracertm/mcp/**"]
[tool.ty.overrides.rules]
unresolved-attribute = "ignore"
call-non-callable = "ignore"
unsupported-operator = "ignore"
invalid-assignment = "ignore"
no-matching-overload = "ignore"
invalid-argument-type = "ignore"
parameter-already-assigned = "ignore"
unknown-argument = "ignore"
possibly-missing-attribute = "ignore"
possibly-missing-implicit-call = "ignore"
redundant-cast = "ignore"

# Observability: optional opentelemetry.* instrumentation; func.__qualname__/__name__ on callable.
[[tool.ty.overrides]]
include = ["src/tracertm/observability/**"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
unresolved-attribute = "ignore"

# Repositories: SQLAlchemy Result.rowcount, dict(rows)/result.all() overloads, return type inference (also when ty runs from src/).
[[tool.ty.overrides]]
include = ["src/tracertm/repositories/**", "tracertm/repositories/**"]
[tool.ty.overrides.rules]
possibly-missing-attribute = "ignore"
no-matching-overload = "ignore"
invalid-return-type = "ignore"

# Storage: conflict_resolver stats dict inference (by_status, by_entity_type).
[[tool.ty.overrides]]
include = ["src/tracertm/storage/**"]
[tool.ty.overrides.rules]
unsupported-operator = "ignore"
possibly-missing-implicit-call = "ignore"

# Schemas: pandera DataFrame, Series, DataFrameModel (optional/version-dependent) (also when ty runs from src/).
[[tool.ty.overrides]]
include = ["src/tracertm/schemas.py", "tracertm/schemas.py"]
[tool.ty.overrides.rules]
possibly-missing-import = "ignore"
possibly-missing-attribute = "ignore"

# Services: optional anthropic, grpc.aio, RpcError.code/details; narrowed to keep invalid-argument-type/invalid-assignment enforced.
[[tool.ty.overrides]]
include = ["src/tracertm/services/**", "tracertm/services/**"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
unresolved-attribute = "ignore"
possibly-missing-import = "ignore"
possibly-missing-attribute = "ignore"

# Workflows: temporalio.workflow RetryPolicy (use temporalio.common); worker references workflows.SandboxSnapshotWorkflow (fixed by importing from sandbox_snapshot); tarfile.open mode overload.
[[tool.ty.overrides]]
include = ["src/tracertm/workflows/**"]
[tool.ty.overrides.rules]
unresolved-attribute = "ignore"
no-matching-overload = "ignore"

# Disabled tests and templates: unresolved references, scaffolding.
[[tool.ty.overrides]]
include = ["tests/_disabled_tests/**", "tests/TEST-TEMPLATE.py"]
[tool.ty.overrides.rules]
unresolved-import = "ignore"
unresolved-attribute = "ignore"
unresolved-reference = "ignore"
missing-argument = "ignore"
unknown-argument = "ignore"
not-subscriptable = "ignore"
invalid-assignment = "ignore"

# Model _exports: optional imports use None fallbacks for unavailable models during migrations.
[[tool.ty.overrides]]
include = ["src/tracertm/models/_exports.py"]
[tool.ty.overrides.rules]
invalid-assignment = "ignore"

# API router agent: _agent_service(request) when request is Request | None (narrowed by branch).
[[tool.ty.overrides]]
include = ["src/tracertm/api/routers/agent.py"]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"

# Tests: common patterns - mocks, UUID->str coercion, deprecated utcnow, exc_info narrowing, async patterns.
[[tool.ty.overrides]]
include = [
    "tests/api/**",
    "tests/phase5/**",
    "tests/component/**",
    "tests/grpc/**",
    "tests/e2e/**",
    "tests/fixtures.py",
    "tests/test_execution_routes.py",
    "tests/mcp/**",
    "tests/performance/**",
    "tests/unit/**",
    "tests/integration/**",
    "tests/workflows/**",
    "tests/chaos/**",
]
[tool.ty.overrides.rules]
invalid-argument-type = "ignore"
invalid-assignment = "ignore"
unresolved-attribute = "ignore"
unresolved-reference = "ignore"
possibly-missing-attribute = "ignore"
possibly-missing-import = "ignore"
possibly-missing-implicit-call = "ignore"
not-subscriptable = "ignore"
unsupported-operator = "ignore"
deprecated = "ignore"
unknown-argument = "ignore"
missing-argument = "ignore"
redundant-cast = "ignore"
call-non-callable = "ignore"
not-iterable = "ignore"
invalid-return-type = "ignore"
invalid-await = "ignore"

[tool.importlinter]
root_packages = ["tracertm"]

[[tool.importlinter.contracts]]
name = "Core layered architecture"
type = "layers"
layers = [
    "config",
    "db",
    "models",
    "repositories",
    "storage",
    "clients",
    "services",
    "api",
]
containers = ["tracertm"]

[[tool.importlinter.contracts]]
name = "API must not access lower layers directly"
type = "forbidden"
source_modules = [
    "tracertm.api",
]
forbidden_modules = [
    "tracertm.db",
    "tracertm.models",
    "tracertm.repositories",
    "tracertm.storage",
    "tracertm.clients",
]

[tool.ruff.lint]
# Strict profile: E/W/F/I/B/C4/UP/N/PT/SIM/RUF + RSE/PERF/LOG/S + ASYNC/PIE/RET/PTH + DTZ/FA/Q (strict best practices)
# Maximum strictness - Phase 5: +9 categories (ANN, TRY, INT, PGH, ISC, FURB, G, ARG, TCH)
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "PT",   # flake8-pytest-style
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules (expanded to include RUF001-RUF060)
    "RSE",  # raise (RSE1xx)
    "PERF", # performance (PERF1xx)
    "LOG",  # logging (LOG0xx)
    "S",    # flake8-bandit / security (S1xx, S2xx, ...)
    "ASYNC", # flake8-async (async/await best practices)
    "PIE",  # flake8-pie (unnecessary pass, spread, etc.)
    "RET",  # flake8-return (explicit return, superfluous else)
    "PTH",  # flake8-use-pathlib (pathlib over os.path)
    "DTZ",  # flake8-datetimez (zoneinfo / datetime.UTC)
    "D",    # pydocstyle (already enabled, critical for API docs)
    "FA",   # flake8-future-annotations (from __future__ import annotations)
    "Q",    # flake8-quotes (align with format quote-style)
    "C90",  # McCabe complexity
    "PLR0911",  # too-many-return-statements
    "PLR0912",  # too-many-branches
    "PLR0913",  # too-many-arguments
    "PLR0915",  # too-many-statements
    "PLR1702",  # too-many-nested-blocks
    "PLR2004",  # magic-value-comparison
    "PLC",   # Pylint conventions
    "PLW",   # Pylint warnings
    "PLE",   # Pylint errors
    "FBT",   # flake8-boolean-trap - No implicit booleans in function args
    # Maximum strictness - Phase 5 additions (9 categories)
    "ANN",   # P0: flake8-annotations - Type annotation enforcement (prevents None bugs)
    "TRY",   # P0: trycepty - Exception handling patterns (prevents silent failures)
    "INT",   # P1: flake8-integer - UUID/int type safety (FastAPI validation)
    "PGH",   # P1: pygrep-hooks - Async best practices (event loop safety)
    "ISC",   # P1: flake8-implicit-str-concat - Prevents ["a"]["b"] → ["ab"] bugs
    "FURB",  # P2: refurb - Modernization (list.copy() vs [*x], f-strings)
    "G",     # P2: flake8-logging-format - Logging anti-patterns
    "ARG",   # P1: flake8-unused-arguments - API correctness (dead params)
    "TCH",   # P1: flake8-type-checking - Import safety (circular imports)
    # Maximum strictness - Phase 6 additions (7 categories)
    "BLE",   # flake8-blind-except - No bare except clauses
    "A",     # flake8-builtins - No shadowing builtins
    "T10",   # flake8-debugger - No debugger statements
    "T20",   # flake8-print - No print statements in production
    "ERA",   # eradicate - No commented-out code
    "SLF",   # flake8-self - No private member access
    "INP",   # flake8-no-pep420 - Implicit namespace packages
]
