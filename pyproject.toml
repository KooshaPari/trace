# TUI: optional textual (textual.app, textual.binding, textual.containers, textual.widgets, textual.geometry, textual.message, textual.reactive); conditional apps/widgets (ConflictPanel, SyncStatusWidget); SearchService.search(project_id) / unknown-argument.
