    "tracertm.services.security_compliance_service",
    "tracertm.database.connection",
    "tracertm.config.settings",
    "tracertm.cli.commands.benchmark",
    "tracertm.cli.commands.backup",
    "tracertm.logging_config",
    "tracertm.repositories.*",
    "tracertm.testing_factories",
    "tracertm.services.traceability_matrix_service",
    "tracertm.services.shortest_path_service",
    "tracertm.services.performance_service",
    "tracertm.services.impact_analysis_service",
    "tracertm.services.export_service",
    "tracertm.services.export_import_service",
    "tracertm.services.cycle_detection_service",
    "tracertm.services.critical_path_service",
    "tracertm.services.advanced_traceability_enhancements_service",
    "tracertm.services.item_service",
    "tracertm.services.event_sourcing_service",
    "tracertm.services.commit_linking_service",
    "tracertm.services.chaos_mode_service",
    "tracertm.services.agent_performance_service",
    "tracertm.services.advanced_analytics_service",
]
ignore_errors = true

[tool.basedpyright]
# Ultra-strict type checking (stricter than mypy)
typeCheckingMode = "strict"
pythonVersion = "3.12"
pythonPlatform = "Linux"
reportUnusedVariable = "error"
reportUnusedImport = "error"
reportUnusedClass = "error"
reportUnusedFunction = "error"
reportUnusedParameter = "error"
reportDuplicateImport = "error"
reportPrivateUsage = "error"
reportConstantRedefinition = "error"
reportInvalidTypeForm = "error"
reportUnnecessaryIsInstance = "error"
reportUnnecessaryCast = "error"
reportUnnecessaryComparison = "error"
reportUnnecessaryContains = "error"
reportAssignmentType = "error"
reportAttributeAccessIssue = "error"
reportCallIssue = "error"
reportIndexIssue = "error"
reportIncompatibleMethodOverride = "error"
reportIncompatibleVariableOverride = "error"
reportInconsistentConstructor = "error"
reportInconsistentMethodOverride = "error"
reportInvalidStringEscapeSequence = "error"
reportMissingTypeArguments = "error"
reportMissingTypeStubs = "warning"
reportOptionalSubscript = "error"
reportOptionalMemberAccess = "error"
reportOptionalCall = "error"
reportOptionalIterable = "error"
reportOptionalContextManager = "error"
reportOptionalOperand = "error"
reportTypedDictNotRequiredAccess = "error"
reportUnknownParameterType = "error"
reportUnknownArgumentType = "error"
reportUnknownLambdaType = "error"
reportUnknownVariableType = "error"
reportUnknownMemberType = "error"
reportUnknownFunctionMemberType = "error"
reportUnknownClassMemberType = "error"
reportGeneralTypeIssues = "error"
reportUntypedBaseClass = "error"
reportUntypedFunctionDecorator = "error"
reportUntypedClassDecorator = "error"
reportUntypedNamedTuple = "error"
reportPrivateImportUsage = "error"
reportInvalidTypeVarUse = "error"
reportMatchNotExhaustive = "error"
reportSelfClsParameterName = "error"
reportIncompatibleImportOverrides = "error"
reportImplicitStringConcatenation = "error"
reportUnnecessaryTypeIgnoreComment = "error"
exclude = [
    "**/node_modules",
    "**/__pycache__",
    ".venv",
    "venv",
    "**/*_pb2.py",
    "**/*_pb2_grpc.py",
]
include = ["src"]

# Relax type-check rules for TUI dashboard tests (mocks cause possibly-missing-attribute/import, invalid-assignment).
[[tool.basedpyright.executionEnvironments]]
root = "tests/unit/tui/apps"
reportAttributeAccessIssue = "none"
reportMissingImports = "none"
reportAssignmentType = "none"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-mock>=3.15.1",
    "pytest-xdist>=3.8.0",
    "pytest-benchmark>=5.2.3",
    "hypothesis>=6.151.4",
    "faker>=40.1.2",
    "factory-boy>=3.3.3",
    "ruff>=0.14.14",
    "mypy>=1.19.1",
]

[tool.uv]
managed = true

[tool.hatch.build.targets.wheel]
packages = ["src/tracertm"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/docs",
    "/pyproject.toml",
    "/README.md",
]

[tool.poe.tasks]
# Format code
format = "ruff format ."

# Lint with auto-fix
lint = "ruff check --fix ."

# Type checking with mypy
type-check = "mypy src/"

# Ultra-strict type checking with basedpyright
type-check-strict = "basedpyright src/"

# Architecture analysis with tach
arch-check = "tach check"

# Architecture visualization
arch-show = "tach show"

# Security scanning (install semgrep via brew: brew install semgrep)
security = "semgrep --config=p/security-audit src/"

# Bandit (Python security linter)
bandit = "bandit -r src/"

# Dependency vulnerability check (PyPI advisory DB)
pip-audit = "pip-audit"

# Run all quality checks
quality = [
    { cmd = "ruff format ." },
    { cmd = "ruff check --fix ." },
    { cmd = "mypy src/" },
    { cmd = "basedpyright src/" },
    { cmd = "tach check" },
    { cmd = "bandit -r src/" },
    { cmd = "pip-audit" },
]

# Run tests
test = "pytest"

# Run tests with coverage
test-cov = "pytest --cov=src/tracertm --cov-report=html"

# Run tests in parallel
test-parallel = "pytest -n auto"

# Run specific test marker
test-unit = "pytest -m unit"
test-integration = "pytest -m integration"

# Full pipeline
all = [
    { cmd = "ruff format ." },
    { cmd = "ruff check --fix ." },
    { cmd = "mypy src/" },
    { cmd = "basedpyright src/" },
    { cmd = "tach check" },
    { cmd = "bandit -r src/" },
    { cmd = "pip-audit" },
    { cmd = "semgrep --config=p/security-audit src/" },
    { cmd = "pytest --cov=src/tracertm --cov-report=html" },
]
