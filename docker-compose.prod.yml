version: '3.8'

# Production-like Docker Compose deployment for local testing
# Usage: docker-compose -f docker-compose.prod.yml up

services:
  #############################################################################
  # Infrastructure Services
  #############################################################################

  postgres:
    image: postgres:17-alpine
    container_name: tracertm-postgres
    environment:
      POSTGRES_USER: tracertm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tracertm_password}
      POSTGRES_DB: tracertm
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracertm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1'

  redis:
    image: redis:7-alpine
    container_name: tracertm-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'

  nats:
    image: nats:2.10-alpine
    container_name: tracertm-nats
    command: nats-server -c /etc/nats/nats.conf -js
    ports:
      - "4222:4222"
      - "8222:8222"
      - "6222:6222"
    volumes:
      - nats_data:/var/lib/nats/jetstream
      - ./config/nats-server.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1'

  neo4j:
    image: neo4j:5.20-community
    container_name: tracertm-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-tracertm_password}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 1024m
    cpus: '2'

  minio:
    image: minio/minio:latest
    container_name: tracertm-minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1'

  #############################################################################
  # Temporal Server (for workflow orchestration)
  #############################################################################

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: tracertm-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres
      DB_PORT: 5432
      POSTGRES_USER: tracertm
      POSTGRES_PWD: ${DB_PASSWORD:-tracertm_password}
      POSTGRES_SEEDS: postgres
      POSTGRES_DB: temporal
    ports:
      - "7233:7233"
      - "7234:7234"
      - "7235:7235"
      - "7236:7236"
      - "7239:7239"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 1024m
    cpus: '2'

  #############################################################################
  # Monitoring Stack
  #############################################################################

  prometheus:
    image: prom/prometheus:latest
    container_name: tracertm-prometheus
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/alerting/production-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 512m
    cpus: '1'

  loki:
    image: grafana/loki:2.9.0
    container_name: tracertm-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'

  grafana:
    image: grafana/grafana:10.2
    container_name: tracertm-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_HTTP_PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'

  #############################################################################
  # Application Services
  #############################################################################

  go-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracertm-go-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      PORT: 8080
      GRPC_PORT: 9090
      ENV: production
      GIN_MODE: release
      DATABASE_URL: postgres://tracertm:${DB_PASSWORD:-tracertm_password}@postgres:5432/tracertm?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      NATS_URL: nats://nats:4222
      TEMPORAL_HOST: temporal:7233
      PYTHON_BACKEND_URL: http://python-backend:8000
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_here_32_chars_min}
      CSRF_SECRET: ${CSRF_SECRET:-your_csrf_secret_here_32_chars_min}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_AUTHKIT_DOMAIN: ${WORKOS_AUTHKIT_DOMAIN:-}
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://localhost:5173
      TRACING_ENABLED: "true"
      JAEGER_ENDPOINT: jaeger:4317
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 512m
    cpus: '2'

  python-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    container_name: tracertm-python-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+asyncpg://tracertm:${DB_PASSWORD:-tracertm_password}@postgres:5432/tracertm
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      NATS_URL: nats://nats:4222
      TEMPORAL_HOST: temporal:7233
      PYTHON_GRPC_PORT: 9092
      GO_BACKEND_URL: http://go-backend:8080
      LOG_LEVEL: INFO
      TRACING_ENABLED: "true"
      OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8000:8000"
      - "9092:9092"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 512m
    cpus: '2'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tracertm-frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "80:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 256m
    cpus: '1'

  #############################################################################
  # Observability
  #############################################################################

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: tracertm-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracertm
    restart: unless-stopped
    mem_limit: 256m
    cpus: '0.5'

networks:
  tracertm:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  neo4j_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
