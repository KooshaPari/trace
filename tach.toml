# Tach Configuration - Architecture Enforcement
# https://github.com/tach-org/tach | https://docs.gauge.sh

source_roots = ["src"]

exclude = [
  "**/__pycache__",
  "**/.pytest_cache",
  "**/.venv",
  "**/venv",
  "**/*.egg-info",
  "**/tests",
  "build",
  "dist",
  "docs",
]

# Strict: fail if declared deps are unused; allow cycles (realistic for this codebase)
exact = true
forbid_circular_dependencies = false
# Uncontained code: "ignore" (default) | "allow" | "dependenciesonly" | "forbid"
root_module = "ignore"

[rules]
unused_ignore_directives = "error"
require_ignore_directive_reasons = "error"

[[modules]]
path = "tracertm.config"
depends_on = []

[[modules]]
path = "tracertm.models"
depends_on = []

[[modules]]
path = "tracertm.services"
depends_on = [
    "tracertm.models",
    "tracertm.core",
    "tracertm.repositories",
    "tracertm.clients",
    "tracertm.schemas",
    "tracertm.workflows"
]

[[modules]]
path = "tracertm.cli"
depends_on = []

[[modules]]
path = "tracertm.database"
depends_on = [
    "tracertm.models",
    "tracertm.core",
    "tracertm.mcp"
]

[[modules]]
path = "tracertm.core"
depends_on = []

[[modules]]
path = "tracertm.schemas"
depends_on = []

[[modules]]
path = "tracertm.repositories"
depends_on = [
    "tracertm.models",
    "tracertm.core", "tracertm.services"]

[[modules]]
path = "tracertm.api"
depends_on = [
    "tracertm.services",
    "tracertm.schemas",
    "tracertm.config",
    "tracertm.models",
    "tracertm.repositories",
    "tracertm.core",
    "tracertm.infrastructure",
    "tracertm.mcp",
    "tracertm.clients",
    "tracertm.database",
    "tracertm.observability"
]

[[modules]]
path = "tracertm.clients"
depends_on = []

[[modules]]
path = "tracertm.storage"
depends_on = [
    "tracertm.models"
]

[[modules]]
path = "tracertm.validation"
depends_on = []

[[modules]]
path = "tracertm.workflows"
depends_on = [
    "tracertm.models",
    "tracertm.infrastructure",
    "tracertm.mcp",
    "tracertm.services"
, "tracertm.config", "tracertm.repositories"]

[[modules]]
path = "tracertm.infrastructure"
depends_on = []

[[modules]]
path = "tracertm.mcp"
depends_on = [
    "tracertm.models",
    "tracertm.config",
    "tracertm.api",
    "tracertm.database",
    "tracertm.services",
    "tracertm.storage",
    "tracertm.core"
, "tracertm.cli"]

[[modules]]
path = "tracertm.tui"
depends_on = [
    "tracertm.models",
    "tracertm.storage",
    "tracertm.database",
    "tracertm.config"
]

[[modules]]
path = "tracertm.observability"
depends_on = []
