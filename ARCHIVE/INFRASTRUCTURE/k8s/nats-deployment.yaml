apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: tracertm
  labels:
    app: nats
    component: messaging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
        component: messaging
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: client
          containerPort: 4222
          protocol: TCP
        - name: monitoring
          containerPort: 8222
          protocol: TCP
        - name: cluster
          containerPort: 6222
          protocol: TCP
        command:
        - nats-server
        - -js
        - -m
        - "8222"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: monitoring
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: monitoring
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: tracertm
  labels:
    app: nats
    component: messaging
spec:
  type: ClusterIP
  ports:
  - name: client
    port: 4222
    targetPort: client
    protocol: TCP
  - name: monitoring
    port: 8222
    targetPort: monitoring
    protocol: TCP
  - name: cluster
    port: 6222
    targetPort: cluster
    protocol: TCP
  selector:
    app: nats
