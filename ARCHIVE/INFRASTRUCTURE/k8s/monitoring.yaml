---
# ServiceMonitor for Backend
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tracertm-backend
  namespace: tracertm
  labels:
    app: tracertm-backend
spec:
  selector:
    matchLabels:
      app: tracertm-backend
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s

---
# ServiceMonitor for API
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tracertm-api
  namespace: tracertm
  labels:
    app: tracertm-api
spec:
  selector:
    matchLabels:
      app: tracertm-api
  endpoints:
  - port: http
    path: /metrics
    interval: 15s

---
# PodMonitor for all pods
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: tracertm-pods
  namespace: tracertm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: tracertm
  podMetricsEndpoints:
  - port: metrics
    interval: 30s

---
# PrometheusRule for alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tracertm-alerts
  namespace: tracertm
spec:
  groups:
  - name: tracertm
    interval: 30s
    rules:
    - alert: HighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate in {{ $labels.pod }}"
        description: "Error rate is {{ $value }} errors/sec"

    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"

    - alert: HighMemoryUsage
      expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage in {{ $labels.pod }}"
        description: "Memory usage is {{ $value | humanizePercentage }}"

    - alert: HighCPUUsage
      expr: rate(container_cpu_usage_seconds_total[5m]) > 0.9
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage in {{ $labels.pod }}"

---
# Grafana Dashboard ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: tracertm
  labels:
    grafana_dashboard: "1"
data:
  tracertm-backend.json: |
    {
      "dashboard": {
        "title": "TraceRTM Backend",
        "panels": [
          {
            "id": 1,
            "title": "Request Rate",
            "targets": [{"expr": "rate(http_requests_total[5m])"}]
          },
          {
            "id": 2,
            "title": "Error Rate",
            "targets": [{"expr": "rate(http_requests_total{status=~\"5..\"}[5m])"}]
          },
          {
            "id": 3,
            "title": "Response Time (P95)",
            "targets": [{"expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))"}]
          }
        ]
      }
    }
