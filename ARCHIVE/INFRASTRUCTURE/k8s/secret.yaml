apiVersion: v1
kind: Secret
metadata:
  name: tracertm-secrets
  namespace: tracertm
  labels:
    app: tracertm
type: Opaque
stringData:
  # Database Credentials
  DB_USER: "tracertm"
  DB_PASSWORD: "changeme_in_production"
  POSTGRES_PASSWORD: "changeme_in_production"

  # Database URLs (complete with credentials)
  DATABASE_URL: "postgresql+asyncpg://tracertm:changeme_in_production@postgres:5432/tracertm"

  # JWT Secret
  JWT_SECRET: "changeme_in_production_use_strong_random_key"

  # Admin Credentials
  ADMIN_PASSWORD: "changeme_in_production"

  # Grafana Admin Password
  GF_SECURITY_ADMIN_PASSWORD: "changeme_in_production"

---
apiVersion: v1
kind: Secret
metadata:
  name: tracertm-registry-secret
  namespace: tracertm
  labels:
    app: tracertm
type: kubernetes.io/dockerconfigjson
data:
  # Base64 encoded Docker registry credentials
  # Replace this with actual registry credentials
  # Example: kubectl create secret docker-registry tracertm-registry-secret \
  #   --docker-server=registry.example.com \
  #   --docker-username=username \
  #   --docker-password=password \
  #   --docker-email=email@example.com
  .dockerconfigjson: e30K
