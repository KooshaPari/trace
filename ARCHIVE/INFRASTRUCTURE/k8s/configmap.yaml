apiVersion: v1
kind: ConfigMap
metadata:
  name: tracertm-config
  namespace: tracertm
  labels:
    app: tracertm
data:
  # Database Configuration
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "tracertm"

  # Redis Configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # NATS Configuration
  NATS_HOST: "nats"
  NATS_PORT: "4222"

  # Application Configuration
  LOG_LEVEL: "INFO"
  GIN_MODE: "release"
  BACKEND_URL: "http://tracertm-backend:8080"

  # Monitoring
  PROMETHEUS_PORT: "9090"

  # Database URLs (non-sensitive parts)
  DATABASE_URL_TEMPLATE: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@postgres:5432/tracertm"
  REDIS_URL_TEMPLATE: "redis://redis:6379"
  NATS_URL_TEMPLATE: "nats://nats:4222"
