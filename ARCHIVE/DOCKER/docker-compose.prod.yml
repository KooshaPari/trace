version: '3.8'

services:
  tracertm-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracertm-backend-prod
    ports:
      - "8080:8080"
    environment:
      # Database (Supabase Cloud)
      DB_DIRECT_URL: ${DB_DIRECT_URL}
      DB_TRANS_POOL_URL: ${DB_TRANS_POOL_URL}
      DB_SESS_POOL_URL: ${DB_SESS_POOL_URL}
      
      # Redis (Upstash Cloud)
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      
      # NATS (Synadia Cloud)
      NATS_USER_JWT: ${NATS_USER_JWT}
      NATS_USER_NKEY_SEED: ${NATS_USER_NKEY_SEED}
      
      # Neo4j (Aura Cloud)
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE}
      
      # Hatchet (Cloud)
      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN}
      
      # WorkOS (Cloud)
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID}
      WORKOS_API_KEY: ${WORKOS_API_KEY}
      
      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      
      # Environment
      ENV: production
      LOG_LEVEL: info
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    
    restart: always
    networks:
      - tracertm-network
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

networks:
  tracertm-network:
    driver: bridge

