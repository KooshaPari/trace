# Percy Visual Regression Testing Configuration
version: 2

# Static assets directory (if you have static snapshots)
# static:
#   include: public/
#   exclude:
#     - '**/*.map'

# Snapshot configuration
snapshot:
  # Enable Percy CSS injection
  enable-javascript: true

  # Viewport widths to capture
  widths:
    - 375 # Mobile
    - 768 # Tablet
    - 1280 # Desktop
    - 1920 # Large desktop

  # Minimum snapshot height
  min-height: 1024

  # Wait for network idle before taking snapshot
  percy-css: ''

# Discovery configuration
discovery:
  # Allowed hostnames (if using percy snapshot server)
  allowed-hostnames:
    - localhost
    - 127.0.0.1

  # Network idle timeout
  network-idle-timeout: 750

# CI/CD specific settings
ci:
  # Branch to use as baseline
  branch: main

  # Parallel build workers
  parallel:
    total: 1
    nonce: ''

# Image quality and processing
image:
  # PNG compression (0-100, higher = better quality)
  quality: 100

  # Enable image diffs
  diff-mode: 'block'

# Request headers (if needed for authentication)
# request-headers:
#   Authorization: 'Bearer TOKEN'

# Browser selection
# browser: 'chrome'  # chrome, firefox, edge

# Debugging
# debug: false
# verbose: false

# Ignore regions (CSS selectors to ignore in diffs)
ignore-regions:
  # Example: Ignore timestamp elements
  # - '.timestamp'
  # - '#live-data'

# Freeze animated GIFs
freeze-animated-image: false

# Freeze animated image by selector
# freeze-animated-selectors:
#   - '.loading-spinner'

# CSS to inject into all snapshots
# percy-css: |
#   .timestamp { display: none !important; }
#   .live-update { display: none !important; }
