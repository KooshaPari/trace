  /api/v1/blockchain/projects/{project_id}/baselines:
    post:
      tags:
        - blockchain
      summary: Create Baseline
      description: |-
        Create a new baseline snapshot.

        Creates a Merkle tree from the provided items and stores
        the baseline with pre-computed proofs for each item.

        Args:
            project_id: The project identifier
            request: Baseline creation parameters
            claims: Authentication claims from JWT
            db: Database session

        Returns:
            BaselineResponse: Created baseline details
      operationId: create_baseline_api_v1_blockchain_projects__project_id__baselines_post
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            description: Project ID
            title: Project Id
          description: Project ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBaselineRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaselineResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
        - blockchain
      summary: List Baselines
      description: |-
        List baselines for a project.

        Args:
            project_id: The project identifier
            baseline_type: Optional filter by baseline type
            spec_type: Optional filter by spec type
            limit: Maximum results to return
            offset: Pagination offset
            claims: Authentication claims from JWT
            db: Database session

        Returns:
            BaselineListResponse: List of baselines
      operationId: list_baselines_api_v1_blockchain_projects__project_id__baselines_get
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            description: Project ID
            title: Project Id
          description: Project ID
        - name: baseline_type
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            description: Filter by type
            title: Baseline Type
          description: Filter by type
        - name: spec_type
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            description: Filter by spec type
            title: Spec Type
          description: Filter by spec type
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            maximum: 200
            minimum: 1
            default: 50
            title: Limit
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
