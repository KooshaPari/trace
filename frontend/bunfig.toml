# Bun configuration for TraceRTM Frontend
# https://bun.sh/docs/runtime/bunfig

[install]
# Use workspaces from package.json
auto = true

# Registry configuration
registry = "https://registry.npmjs.org/"

# Cache configuration
# NOTE: Bun treats a string `cache = "..."` as a filesystem path for the on-disk cache.
# Using `cache = "disable"` accidentally creates a `frontend/disable/` cache directory that
# gets picked up by tooling (typecheck, bundlers, linters) and can break module resolution.
# If you need to turn caching off, set `cache = false`.
cache = true

# Lockfile
frozen = false # Set to true in CI to ensure lockfile isn't modified

# Install options
production = false
optional = true
dev = true
peer = true

# Always install exact versions
exact = false

[install.scopes]
# Add scoped registries if needed
# "@myorg" = { url = "https://registry.myorg.com/", token = "$NPM_TOKEN" }

[run]
# Shell to use for scripts
shell = "bun"

# Enable bun shell
bun = true

[test]
# Test runner configuration
coverage = false
bail = false

# Test timeout in milliseconds
timeout = 5000

[define]
# Environment variable replacements at build time
# "process.env.NODE_ENV" = "production"

[loader]
# Custom loaders for file types
".svg" = "text"
".graphql" = "text"
".gql" = "text"

[macro]
# Macros configuration (experimental)

# Telemetry configuration
telemetry = false

# Log level: "debug" | "warn" | "error"
logLevel = "error"
