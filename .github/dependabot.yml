version: 2

# Dependabot configuration for automated dependency updates
# This configuration covers all package ecosystems in the TraceRTM project

updates:
  # Frontend monorepo (npm/bun)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "kooshapari"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "frontend"
      - "automated"
    # Group updates for related packages
    groups:
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
      testing-frameworks:
        patterns:
          - "vitest*"
          - "playwright*"
          - "@testing-library/*"
          - "jest*"
      build-tools:
        patterns:
          - "vite*"
          - "turbo*"
          - "typescript"
          - "@biomejs/*"
      ui-libraries:
        patterns:
          - "@radix-ui/*"
          - "tailwindcss"
          - "lucide-react"
    # Version update strategies
    versioning-strategy: "increase"
    # Ignore major version updates for critical packages (review manually)
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Frontend web app
  - package-ecosystem: "npm"
    directory: "/frontend/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps-web)"
    labels:
      - "dependencies"
      - "frontend"
      - "web-app"

  # Frontend desktop app
  - package-ecosystem: "npm"
    directory: "/frontend/apps/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps-desktop)"
    labels:
      - "dependencies"
      - "frontend"
      - "desktop-app"

  # Python backend (root pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "kooshapari"
    commit-message:
      prefix: "chore(deps-python)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
      - "automated"
    # Group updates for related packages
    groups:
      fastapi-ecosystem:
        patterns:
          - "fastapi*"
          - "starlette*"
          - "pydantic*"
          - "uvicorn*"
      database-drivers:
        patterns:
          - "sqlalchemy*"
          - "alembic*"
          - "psycopg*"
          - "neo4j*"
      testing-tools:
        patterns:
          - "pytest*"
          - "coverage*"
          - "hypothesis*"
      async-libraries:
        patterns:
          - "aiohttp*"
          - "httpx*"
          - "asyncio*"
    # Allow only security and patch updates for Python stdlib
    ignore:
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # Python CLI tool
  - package-ecosystem: "pip"
    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:30"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps-cli)"
    labels:
      - "dependencies"
      - "python"
      - "cli"

  # Go backend (main module)
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "kooshapari"
    commit-message:
      prefix: "chore(deps-go)"
      include: "scope"
    labels:
      - "dependencies"
      - "golang"
      - "backend"
      - "automated"
    # Group updates for related packages
    groups:
      fiber-ecosystem:
        patterns:
          - "github.com/gofiber/*"
      database-drivers:
        patterns:
          - "github.com/lib/pq*"
          - "github.com/neo4j/*"
          - "gorm.io/*"
      temporal-sdk:
        patterns:
          - "go.temporal.io/*"
      aws-sdk:
        patterns:
          - "github.com/aws/aws-sdk-go*"
      testing-tools:
        patterns:
          - "github.com/stretchr/testify*"
          - "github.com/testcontainers/*"
    versioning-strategy: "increase"

  # Go backend tests module
  - package-ecosystem: "gomod"
    directory: "/backend/tests"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "09:30"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps-go-tests)"
    labels:
      - "dependencies"
      - "golang"
      - "testing"

  # Go integration tests - clients
  - package-ecosystem: "gomod"
    directory: "/backend/tests/integration/clients"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "10:00"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps-go-integration)"
    labels:
      - "dependencies"
      - "golang"
      - "integration-tests"

  # Go integration tests - database
  - package-ecosystem: "gomod"
    directory: "/backend/tests/integration/database"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "10:30"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore(deps-go-integration)"
    labels:
      - "dependencies"
      - "golang"
      - "integration-tests"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    reviewers:
      - "kooshapari"
    commit-message:
      prefix: "chore(deps-actions)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"
      - "automated"
    # Group related actions
    groups:
      setup-actions:
        patterns:
          - "actions/setup-*"
      cache-actions:
        patterns:
          - "actions/cache*"
      checkout-actions:
        patterns:
          - "actions/checkout*"

  # Docker base images (if Dockerfile exists)
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "09:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps-docker)"
    labels:
      - "dependencies"
      - "docker"
      - "infrastructure"
