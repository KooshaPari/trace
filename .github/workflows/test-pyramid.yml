name: Test Pyramid Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pyramid-verification:
    name: Verify Test Pyramid Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          cache: 'pip'
        with:
          python-version: "3.12"

      - name: Run test pyramid verification
        id: pyramid
        run: |
          bash backend/scripts/verify-test-pyramid.sh > /tmp/pyramid-output.txt 2>&1
          EXIT_CODE=$?
          cat /tmp/pyramid-output.txt
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Generate pyramid summary for PR
        if: always()
        run: |
          echo "## Test Pyramid Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          bash backend/scripts/verify-test-pyramid.sh >> $GITHUB_STEP_SUMMARY 2>&1 || true

      - name: Comment on PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/pyramid-output.txt', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Test Pyramid Verification\n\n```\n' + output + '\n```'
            });

      - name: Fail if pyramid violated
        if: failure()
        run: |
          echo "❌ Test pyramid constraints violated!"
          echo "Required: unit >= 70%, E2E <= 10%"
          exit 1
