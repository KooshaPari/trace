name: Chaos Engineering Tests

on:
  schedule:
    # Run chaos tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tests/chaos/**'
      - '.github/workflows/chaos-tests.yml'

env:
  PYTHON_VERSION: '3.12'
  RECOVERY_TIME_TARGET: 30

jobs:
  chaos-tests:
    name: Chaos Engineering - Resilience Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tracertm_test
          POSTGRES_USER: tracertm
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      nats:
        image: nats:2.10-alpine
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8222/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 4222:4222
          - 8222:8222

      # Toxiproxy for chaos injection
      toxiproxy:
        image: ghcr.io/shopify/toxiproxy:2.9.0
        ports:
          - 8474:8474
          - 15432:15432
          - 16379:16379
          - 14222:14222

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          cache: 'pip'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev,test]"

      - name: Verify Toxiproxy is running
        run: |
          curl -f http://localhost:8474/version || exit 1
          echo "Toxiproxy version: $(curl -s http://localhost:8474/version)"

      - name: Run chaos tests - Network Latency
        env:
          DATABASE_URL: postgresql+asyncpg://tracertm:test_password@localhost:5432/tracertm_test
          REDIS_URL: redis://localhost:6379
          TOXIPROXY_HOST: localhost
          TOXIPROXY_PORT: 8474
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          pytest tests/chaos/test_network_latency.py \
            -v \
            --tb=short \
            --maxfail=3 \
            --junitxml=chaos-latency-results.xml

      - name: Run chaos tests - Connection Failures
        if: success() || failure()
        env:
          DATABASE_URL: postgresql+asyncpg://tracertm:test_password@localhost:5432/tracertm_test
          REDIS_URL: redis://localhost:6379
          TOXIPROXY_HOST: localhost
          TOXIPROXY_PORT: 8474
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          pytest tests/chaos/test_connection_failures.py \
            -v \
            --tb=short \
            --maxfail=3 \
            --junitxml=chaos-failures-results.xml

      - name: Run chaos tests - Resource Exhaustion
        if: success() || failure()
        env:
          DATABASE_URL: postgresql+asyncpg://tracertm:test_password@localhost:5432/tracertm_test
          REDIS_URL: redis://localhost:6379
          TOXIPROXY_HOST: localhost
          TOXIPROXY_PORT: 8474
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          pytest tests/chaos/test_resource_exhaustion.py \
            -v \
            --tb=short \
            --maxfail=3 \
            --junitxml=chaos-resources-results.xml

      - name: Run chaos tests - End-to-End Resilience
        if: success() || failure()
        env:
          DATABASE_URL: postgresql+asyncpg://tracertm:test_password@localhost:5432/tracertm_test
          REDIS_URL: redis://localhost:6379
          TOXIPROXY_HOST: localhost
          TOXIPROXY_PORT: 8474
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          pytest tests/chaos/test_end_to_end_resilience.py \
            -v \
            --tb=short \
            --maxfail=2 \
            --junitxml=chaos-e2e-results.xml

      - name: Generate chaos test summary
        if: always()
        run: |
          echo "## Chaos Engineering Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recovery Time Target:** ${RECOVERY_TIME_TARGET}s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for file in chaos-*-results.xml; do
            if [ -f "$file" ]; then
              test_type=$(echo "$file" | sed 's/chaos-\(.*\)-results.xml/\1/')
              TOTAL=$(grep -oP 'tests="\K[0-9]+' "$file" | head -1 || echo "0")
              FAILURES=$(grep -oP 'failures="\K[0-9]+' "$file" | head -1 || echo "0")
              ERRORS=$(grep -oP 'errors="\K[0-9]+' "$file" | head -1 || echo "0")
              PASSED=$((TOTAL - FAILURES - ERRORS))

              echo "### ${test_type^} Tests" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
              echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
              echo "| ❌ Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
              echo "| 🚨 Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Upload chaos test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-results
          path: |
            chaos-*-results.xml
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Chaos Engineering tests failed! System may not meet resilience SLA.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

  # Run chaos tests in staging environment (requires staging deployment)
  chaos-staging:
    name: Chaos Tests - Staging Environment
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'staging' || github.event_name == 'schedule'
    needs: []
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubectl for staging
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy Toxiproxy to staging
        env:
          KUBECONFIG: kubeconfig
        run: |
          # This would deploy Toxiproxy as a sidecar or separate pod
          # For now, we'll document this step
          echo "TODO: Deploy Toxiproxy to staging namespace"
          echo "Use: kubectl apply -f deploy/k8s/chaos/toxiproxy-deployment.yml -n tracertm-staging"

      - name: Run chaos scenarios
        env:
          KUBECONFIG: kubeconfig
        run: |
          echo "TODO: Execute chaos scenarios in staging"
          echo "Monitor metrics during chaos injection"
          echo "Verify recovery times meet SLA"

      - name: Generate staging chaos report
        if: always()
        run: |
          echo "## Staging Chaos Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** staging" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Recovery Target:** ${RECOVERY_TIME_TARGET}s" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Chaos scenarios executed against live staging environment." >> $GITHUB_STEP_SUMMARY
