  # Coverage Regression Detection
  coverage-regression-check:
    name: Coverage Regression Detection
    runs-on: ubuntu-latest
    needs: [python-tests, go-tests, frontend-checks]
    if: always()
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download current coverage artifacts
      uses: actions/download-artifact@v4
      with:
        path: current-coverage
      continue-on-error: true

    - name: Download baseline coverage (if available)
      uses: actions/download-artifact@v4
      with:
        name: go-coverage-baseline
        path: baseline-coverage
      continue-on-error: true

    - name: Compare coverage and report regressions
      run: |
        python3 << 'EOF'
        import os
        import json
        from pathlib import Path

        # Coverage comparison function
        def compare_coverage():
            regressions = []
            improvements = []

            # Go coverage comparison
            print("\n=== Go Coverage Analysis ===")
            current_go = "current-coverage/go-test-results/backend/coverage-by-file.txt"
            baseline_go = "baseline-coverage/coverage-by-file.txt"

            current_go_data = {}
            baseline_go_data = {}

            if os.path.exists(current_go):
                with open(current_go) as f:
                    for line in f:
                        if line.strip():
                            parts = line.strip().split('|')
                            if len(parts) == 2:
                                current_go_data[parts[0]] = float(parts[1])

            if os.path.exists(baseline_go):
                with open(baseline_go) as f:
                    for line in f:
                        if line.strip():
                            parts = line.strip().split('|')
                            if len(parts) == 2:
                                baseline_go_data[parts[0]] = float(parts[1])

            # Detect Go regressions
            if baseline_go_data:
                for pkg, current_cov in current_go_data.items():
                    if pkg in baseline_go_data:
                        baseline_cov = baseline_go_data[pkg]
                        diff = current_cov - baseline_cov
                        if diff < -0.1:  # 0.1% regression threshold
                            regressions.append({
                                'type': 'Go',
                                'package': pkg,
                                'current': current_cov,
                                'previous': baseline_cov,
                                'diff': diff
                            })
                        elif diff > 0.1:
                            improvements.append({
                                'type': 'Go',
                                'package': pkg,
                                'current': current_cov,
                                'previous': baseline_cov,
                                'diff': diff
                            })
                print(f"✓ Compared {len(current_go_data)} Go packages against baseline")
            else:
                print("ℹ No baseline found (first run), skipping Go regression check")

            # Python coverage comparison
            print("\n=== Python Coverage Analysis ===")
            current_python = "current-coverage/python-test-results/python-coverage-by-package.txt"
            baseline_python = "baseline-coverage/python-coverage-by-package.txt"

            current_python_data = {}
            baseline_python_data = {}

            if os.path.exists(current_python):
                with open(current_python) as f:
                    for line in f:
                        if line.strip():
                            parts = line.strip().split('|')
                            if len(parts) == 2:
                                current_python_data[parts[0]] = float(parts[1])

            if os.path.exists(baseline_python):
                with open(baseline_python) as f:
                    for line in f:
                        if line.strip():
                            parts = line.strip().split('|')
                            if len(parts) == 2:
                                baseline_python_data[parts[0]] = float(parts[1])

            # Detect Python regressions
            if baseline_python_data:
                for pkg, current_cov in current_python_data.items():
                    if pkg in baseline_python_data:
                        baseline_cov = baseline_python_data[pkg]
                        diff = current_cov - baseline_cov
                        if diff < -0.1:
                            regressions.append({
                                'type': 'Python',
                                'package': pkg,
                                'current': current_cov,
                                'previous': baseline_cov,
                                'diff': diff
                            })
                        elif diff > 0.1:
                            improvements.append({
                                'type': 'Python',
                                'package': pkg,
                                'current': current_cov,
                                'previous': baseline_cov,
                                'diff': diff
                            })
                print(f"✓ Compared {len(current_python_data)} Python packages against baseline")
            else:
                print("ℹ No baseline found (first run), skipping Python regression check")

            # Frontend coverage comparison
            print("\n=== Frontend Coverage Analysis ===")
            current_frontend = "current-coverage/frontend-lint-results/coverage-by-file.txt"
            baseline_frontend = "baseline-coverage/frontend-coverage-by-file.txt"

            if os.path.exists(current_frontend):
                with open(current_frontend) as f:
                    for line in f:
                        if line.strip() and line.startswith("TOTAL|"):
                            parts = line.strip().split('|')
                            if len(parts) == 2:
                                current_frontend_cov = float(parts[1])
                                print(f"Current Frontend Coverage: {current_frontend_cov}%")

            # Print summary
            print("\n" + "="*60)
            print("COVERAGE REGRESSION REPORT")
            print("="*60)

            if regressions:
                print(f"\n❌ REGRESSIONS DETECTED ({len(regressions)} packages):\n")
                for item in sorted(regressions, key=lambda x: x['diff']):
                    prev_str = f"{item['previous']:.2f}%"
                    curr_str = f"{item['current']:.2f}%"
                    diff_str = f"{item['diff']:+.2f}%"
                    print(f"  • {item['type']:8} {item['package']:30} {prev_str:>8} → {curr_str:>8} ({diff_str})")
            else:
                print("\n✓ No regressions detected")

            if improvements:
                print(f"\n✅ IMPROVEMENTS ({len(improvements)} packages):\n")
                for item in sorted(improvements, key=lambda x: -x['diff'])[:5]:  # Show top 5
                    prev_str = f"{item['previous']:.2f}%"
                    curr_str = f"{item['current']:.2f}%"
                    diff_str = f"{item['diff']:+.2f}%"
                    print(f"  • {item['type']:8} {item['package']:30} {prev_str:>8} → {curr_str:>8} ({diff_str})")

            print("\n" + "="*60)

            return regressions

        regressions = compare_coverage()

        # Exit with error if regressions found
        if regressions:
            print("\n::error::Coverage regression detected! Some packages have lower coverage than baseline.")
            exit(1)
        else:
            print("\n::notice::Coverage check passed - no regressions detected")
            exit(0)
        EOF

  # Docker Build
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [python-tests, go-tests]
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ env.REGISTRY_USERNAME }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Python API
      id: meta-api
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/tracertm-api
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Python API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta-api.outputs.tags }}
        labels: ${{ steps.meta-api.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        build-contexts: |
          base=docker-image://python:3.12-slim

    - name: Extract metadata for Go Backend
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/tracertm-backend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Go Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
        build-contexts: |
          base=docker-image://golang:1.23-alpine

  # Infrastructure as Code (Pulumi) - Dev Stack
  iac-dev:
    name: IaC Deploy (Pulumi dev)
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Only run when a Pulumi access token is configured; otherwise skip gracefully.
    if: ${{ secrets.PULUMI_ACCESS_TOKEN != '' }}

    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Pulumi Node.js dependencies
      working-directory: infra
      run: bun install

    - name: Pulumi up (dev)
      uses: pulumi/actions@v5
      env:
        PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      with:
        command: up
        stack-name: dev
        work-dir: infra
        comment-on-pr: false

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.tracertm.example.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Deploy to staging
      env:
        NAMESPACE: tracertm-staging
        IMAGE_TAG: develop-${{ github.sha }}
        DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}
      run: |
        chmod +x scripts/shell/deploy.sh
        ./scripts/shell/deploy.sh all

    - name: Verify deployment
      run: |
        export KUBECONFIG=kubeconfig
        kubectl rollout status deployment/tracertm-api -n tracertm-staging
        kubectl rollout status deployment/tracertm-backend -n tracertm-staging

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'release'
    environment:
      name: production
      url: https://tracertm.example.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'latest'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Deploy to production
      env:
        NAMESPACE: tracertm
        IMAGE_TAG: ${{ github.event.release.tag_name }}
        DOCKER_REGISTRY: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}
      run: |
        chmod +x scripts/shell/deploy.sh
        ./scripts/shell/deploy.sh all

    - name: Verify deployment
      run: |
        export KUBECONFIG=kubeconfig
        kubectl rollout status deployment/tracertm-api -n tracertm
        kubectl rollout status deployment/tracertm-backend -n tracertm

    - name: Run smoke tests
      run: |
        # Add smoke tests here
        curl -f https://tracertm.example.com/health || exit 1
