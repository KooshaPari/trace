name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  # First, verify that tests pass
  verify-tests:
    name: Verify Tests Pass
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    outputs:
      should-merge: ${{ steps.check.outputs.should-merge }}
      update-type: ${{ steps.metadata.outputs.update-type }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check update type
        id: check
        run: |
          echo "Update type: ${{ steps.metadata.outputs.update-type }}"
          echo "Dependency names: ${{ steps.metadata.outputs.dependency-names }}"

          # Auto-merge patch and minor updates
          if [[ "${{ steps.metadata.outputs.update-type }}" == "version-update:semver-patch" ]] || \
             [[ "${{ steps.metadata.outputs.update-type }}" == "version-update:semver-minor" ]]; then
            echo "should-merge=true" >> $GITHUB_OUTPUT
          else
            echo "should-merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: contains(steps.metadata.outputs.dependency-names, 'npm') || contains(steps.metadata.outputs.dependency-names, 'node')
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
        with:
          node-version: '20'
          cache: 'bun'

      - name: Set up Python
        if: contains(steps.metadata.outputs.dependency-names, 'python')
        uses: actions/setup-python@v5
        with:
          cache: 'pip'
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Go
        if: contains(steps.metadata.outputs.dependency-names, 'go')
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install dependencies
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend && bun install
          fi
          if [ -f "pyproject.toml" ]; then
            pip install -e .
          fi
          if [ -f "backend/go.mod" ]; then
            cd backend && go mod download
          fi

      - name: Run linting
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend && bun run lint || true
          fi

      - name: Run tests
        run: |
          # Run frontend tests
          if [ -f "frontend/package.json" ]; then
            cd frontend && bun run test || exit 1
          fi

          # Run Go tests
          if [ -f "backend/go.mod" ]; then
            cd backend && go test ./... -short || exit 1
          fi

          # Run Python tests
          if [ -f "pyproject.toml" ]; then
            pytest tests/ -v || exit 1
          fi

  # Auto-approve and merge
  auto-merge:
    name: Auto-Merge PR
    runs-on: ubuntu-latest
    needs: verify-tests
    if: needs.verify-tests.outputs.should-merge == 'true'

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      - name: Approve PR
        run: |
          gh pr review "$PR_URL" --approve -b "Auto-approving ${{ steps.metadata.outputs.update-type }} update"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: |
          gh pr merge "$PR_URL" --auto --squash
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Comment on major updates
  comment-major-update:
    name: Comment on Major Update
    runs-on: ubuntu-latest
    needs: verify-tests
    if: needs.verify-tests.outputs.update-type == 'version-update:semver-major'

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      - name: Comment on PR
        run: |
          gh pr comment "$PR_URL" --body "⚠️ **Major version update detected**

          This PR contains a major version update and requires manual review before merging.

          **Dependency**: ${{ steps.metadata.outputs.dependency-names }}
          **Update type**: ${{ steps.metadata.outputs.update-type }}

          Please review the changelog and breaking changes before approving this PR."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
