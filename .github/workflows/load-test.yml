name: Load Testing

on:
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'

jobs:
  load-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start backend service
        run: |
          # Start the backend in the background
          # Assuming there's a way to start the backend (docker, npm, etc.)
          echo "Starting backend service..."
          # This is a placeholder - adjust based on your actual setup
          # For now, we'll just wait and let k6 handle failures gracefully
          sleep 5

      - name: Run k6 load test
        run: |
          mkdir -p performance-results
          k6 run backend/tests/performance/load_test.js \
            --out json=performance-results/results-${{ github.run_id }}.json \
            --out csv=performance-results/results-${{ github.run_id }}.csv \
            2>&1 | tee performance-results/output.log
        env:
          API_URL: 'http://localhost:3030'
          PROJECT_ID: 'test-project-load'
          AUTH_TOKEN: ''
        continue-on-error: true

      - name: Check performance thresholds
        run: |
          python3 << 'EOF'
          import json
          import sys
          import os

          results_file = 'performance-results/results-${{ github.run_id }}.json'

          if not os.path.exists(results_file):
            print("❌ Results file not found. Backend may not be running.")
            print("Thresholds will not be checked in CI environment.")
            sys.exit(0)

          try:
            with open(results_file, 'r') as f:
              data = json.load(f)

            metrics = data.get('metrics', {})

            # Initialize threshold violations list
            violations = []

            # Check P95 latency threshold (< 500ms)
            if 'http_req_duration' in metrics:
              p95 = metrics['http_req_duration'].get('values', {}).get('p(95)', float('inf'))
              print(f"P95 Latency: {p95:.2f}ms")
              if p95 > 500:
                violations.append(f"P95 latency ({p95:.2f}ms) exceeds 500ms threshold")

            # Check error rate threshold (< 1%)
            if 'http_req_failed' in metrics:
              error_rate = metrics['http_req_failed'].get('values', {}).get('rate', 0)
              error_pct = error_rate * 100
              print(f"Error Rate: {error_pct:.2f}%")
              if error_rate > 0.01:
                violations.append(f"Error rate ({error_pct:.2f}%) exceeds 1% threshold")

            # Check RPS (requests per second) - should be > 100
            if 'http_reqs' in metrics:
              total_reqs = metrics['http_reqs'].get('values', {}).get('count', 0)
              duration_sec = data.get('state', {}).get('testRunDurationMs', 1) / 1000
              rps = total_reqs / max(duration_sec, 1)
              print(f"Requests Per Second: {rps:.2f}")
              if rps < 100:
                print(f"⚠️  Warning: RPS ({rps:.2f}) is below 100 threshold (may be normal for slow backends)")

            # Print all violations
            if violations:
              print("\n⚠️  Threshold Violations:")
              for v in violations:
                print(f"  - {v}")
              # Note: We don't fail on threshold violations in CI
              # Only warn about them
            else:
              print("\n✅ All thresholds passed!")

          except Exception as e:
            print(f"Error parsing results: {e}")
            sys.exit(0)  # Don't fail CI if we can't parse results

          EOF

      - name: Compare with baseline
        run: |
          python3 << 'EOF'
          import json
          import os
          from pathlib import Path

          current_file = 'performance-results/results-${{ github.run_id }}.json'
          baseline_file = '.github/performance-baseline.json'

          if not os.path.exists(current_file):
            print("Current results not available, skipping baseline comparison")
            exit(0)

          try:
            with open(current_file, 'r') as f:
              current = json.load(f)

            if os.path.exists(baseline_file):
              with open(baseline_file, 'r') as f:
                baseline = json.load(f)

              # Compare key metrics
              current_metrics = current.get('metrics', {})
              baseline_metrics = baseline.get('metrics', {})

              current_p95 = current_metrics.get('http_req_duration', {}).get('values', {}).get('p(95)', 0)
              baseline_p95 = baseline_metrics.get('http_req_duration', {}).get('values', {}).get('p(95)', float('inf'))

              current_error_rate = current_metrics.get('http_req_failed', {}).get('values', {}).get('rate', 0)
              baseline_error_rate = baseline_metrics.get('http_req_failed', {}).get('values', {}).get('rate', 0)

              print("Performance Comparison vs Baseline:")
              print("=" * 50)

              # P95 latency comparison
              if baseline_p95 != float('inf') and baseline_p95 > 0:
                p95_change = ((current_p95 - baseline_p95) / baseline_p95) * 100
                status = "❌" if p95_change > 10 else "✅"
                print(f"{status} P95 Latency: {current_p95:.2f}ms (baseline: {baseline_p95:.2f}ms, {p95_change:+.1f}%)")

                if p95_change > 10:
                  print(f"   WARNING: Performance degraded more than 10%")

              # Error rate comparison
              if baseline_error_rate > 0:
                error_change = ((current_error_rate - baseline_error_rate) / baseline_error_rate) * 100
                status = "❌" if error_change > 10 else "✅"
                print(f"{status} Error Rate: {current_error_rate*100:.2f}% (baseline: {baseline_error_rate*100:.2f}%, {error_change:+.1f}%)")
              else:
                print(f"✅ Error Rate: {current_error_rate*100:.2f}%")
            else:
              print("No baseline found. Creating baseline from current run...")
              # Save as new baseline
              os.makedirs('.github', exist_ok=True)
              import shutil
              shutil.copy(current_file, baseline_file)
              print(f"Baseline saved to {baseline_file}")

          except Exception as e:
            print(f"Error during comparison: {e}")

          EOF

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-results-${{ github.run_id }}
          path: performance-results/
          retention-days: 30

      - name: Comment on PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            try {
              const outputLog = fs.readFileSync('performance-results/output.log', 'utf8');

              // Extract key metrics from log
              const lines = outputLog.split('\n');
              const summary = lines.slice(-30).join('\n');

              const comment = `## Load Testing Results

            **Run ID:** ${{ github.run_id }}

            \`\`\`
            ${summary}
            \`\`\`

            **Artifacts:** Load test results are available in the workflow artifacts.

            **Note:** Load tests run in CI environment may have different performance characteristics than local/staging environments.`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not add PR comment:', e.message);
            }

      - name: Upload baseline for next run
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: .github/performance-baseline.json
          retention-days: 90
        continue-on-error: true
