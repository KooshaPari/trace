name: Chromatic Visual Regression Testing

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths:
      - "frontend/apps/web/src/components/**"
      - "frontend/apps/web/.storybook/**"
      - "frontend/apps/web/package.json"
      - ".github/workflows/chromatic.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "frontend/apps/web/src/components/**"
      - "frontend/apps/web/.storybook/**"
      - "frontend/apps/web/package.json"

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: frontend/apps/web
        run: bun install --frozen-lockfile

      - name: Build Storybook
        working-directory: frontend/apps/web
        run: bun run storybook:build

      - name: Run Chromatic
        working-directory: frontend/apps/web
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: bun run chromatic:ci

      - name: Upload chromatic report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chromatic-report
          path: frontend/apps/web/junit-report.xml
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'frontend/apps/web/junit-report.xml';

            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf8');
              const passMatch = report.match(/tests="(\d+)"/);
              const failureMatch = report.match(/failures="(\d+)"/);

              const tests = passMatch ? passMatch[1] : 'unknown';
              const failures = failureMatch ? failureMatch[1] : '0';

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Visual Regression Test Results\n\n- **Total Snapshots**: ${tests}\n- **Regressions Found**: ${failures}\n\n[View full Chromatic report](${process.env.CHROMATIC_URL})`
              });
            }

  visual-test-status:
    name: Visual Test Status Check
    runs-on: ubuntu-latest
    if: always()
    needs: chromatic

    steps:
      - name: Check visual test results
        if: needs.chromatic.result == 'failure'
        run: |
          echo "Visual regression tests failed"
          exit 1

      - name: Visual tests passed
        if: needs.chromatic.result == 'success'
        run: echo "All visual regression tests passed"
