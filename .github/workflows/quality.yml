name: Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all

      - name: Install pytest-xdist for parallelization
        run: uv pip install pytest-xdist

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Check for unused imports (pycln)
        run: uv run pycln --check src/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Type check (basedpyright)
        run: uv run basedpyright src/

      - name: Architecture check
        run: uv run tach check

      - name: Security scan (Bandit)
        run: uv run bandit -r src/

      - name: Install Semgrep (binary; project does not depend on semgrep package)
        run: pip install semgrep
      - name: Security scan (Semgrep - community rules)
        run: semgrep --config=p/security-audit src/
      - name: Security scan (Semgrep - project rules)
        run: |
          if [ -f .semgrep.yml ]; then
            semgrep --config=.semgrep.yml src/
          else
            echo "No .semgrep.yml found, skipping project-specific rules"
          fi

      - name: Docstring coverage
        run: uv run interrogate -vv --fail-under=80 src/

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report-${{ matrix.python-version }}
          path: |
            .mypy_cache/
            .ruff_cache/

