name: Comprehensive Test Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  setup-test-users:
    runs-on: ubuntu-latest
    name: Setup test users and credentials
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: 'npm'
        with:
          node-version: '20'

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Setup test credentials
        env:
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
        run: |
          make test-setup

  test-frontend-e2e:
    needs: setup-test-users
    runs-on: ubuntu-latest
    name: Frontend E2E Tests (Playwright)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: 'npm'
        with:
          node-version: '20'

      - name: Install bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd frontend/apps/web
          bun install

      - name: Run Playwright WebSocket validation
        run: |
          cd frontend/apps/web
          bun run test:e2e -- websocket-validation.spec.ts

      - name: Run Playwright route validation
        run: |
          cd frontend/apps/web
          bun run test:e2e -- route-validation.spec.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/apps/web/playwright-report/
          retention-days: 30

  test-frontend-api:
    needs: setup-test-users
    runs-on: ubuntu-latest
    name: Frontend API Tests (Vitest)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: 'npm'
        with:
          node-version: '20'

      - name: Install bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd frontend/apps/web
          bun install

      - name: Run Vitest API validation
        run: |
          cd frontend/apps/web
          bun run test -- src/__tests__/api/routes-validation.comprehensive.test.ts

      - name: Upload Vitest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: frontend/apps/web/test-results/
          retention-days: 30

  test-backend-go:
    needs: setup-test-users
    runs-on: ubuntu-latest
    name: Backend Go Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run Go route validation
        run: |
          cd backend
          go test -v ./internal/handlers -run TestAllRoutes -race

      - name: Run Go WebSocket CORS validation
        run: |
          cd backend
          go test -v ./internal/handlers -run TestWebSocketCORSHeaders -race

      - name: Upload Go test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-results
          path: |
            backend/coverage.out
            backend/test-results/
          retention-days: 30

  test-backend-python:
    needs: setup-test-users
    runs-on: ubuntu-latest
    name: Backend Python Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install UV
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Run Python route validation
        run: |
          cd backend
          uv run pytest tests/unit/api/test_routes_validation.py -v --tb=short

      - name: Upload Python test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results
          path: |
            backend/test-results/
            backend/.pytest_cache/
          retention-days: 30

  report:
    needs:
      - test-frontend-e2e
      - test-frontend-api
      - test-backend-go
      - test-backend-python
    runs-on: ubuntu-latest
    name: Generate Validation Report
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: validation-artifacts/

      - name: Generate consolidated report
        run: |
          cat > VALIDATION_REPORT.md << 'EOF'
          # Comprehensive Test Validation Report

          - **Timestamp**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          - **Commit**: ${{ github.sha }}
          - **Branch**: ${{ github.ref_name }}

          ## Test Suite Results

          | Suite | Status |
          |-------|--------|
          | Frontend E2E (Playwright) | ${{ job.test-frontend-e2e.status }} |
          | Frontend API (Vitest) | ${{ job.test-frontend-api.status }} |
          | Backend Go | ${{ job.test-backend-go.status }} |
          | Backend Python | ${{ job.test-backend-python.status }} |

          ## Artifacts

          All test reports and coverage data are available as artifacts:
          - `playwright-report/` - Playwright E2E test results
          - `vitest-report/` - Vitest API test results
          - `go-test-results/` - Go backend test results
          - `python-test-results/` - Python backend test results

          ## Execution Metadata

          - **GitHub Actions Run**: [${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - **Triggered by**: ${{ github.event_name }}

          EOF

      - name: Comment PR with report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('VALIDATION_REPORT.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: VALIDATION_REPORT.md
          retention-days: 30

  validation-summary:
    needs: [report]
    runs-on: ubuntu-latest
    name: Validation Summary
    if: always()
    steps:
      - name: Check validation status
        run: |
          echo "## Validation Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test suites have completed execution." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View results:" >> $GITHUB_STEP_SUMMARY
          echo "- [Run Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
