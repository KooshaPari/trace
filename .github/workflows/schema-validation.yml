name: Schema Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/internal/db/migrations/**'
      - 'backend/internal/models/**'
      - 'backend/internal/db/models.go'
      - 'backend/sqlc.yaml'
      - 'backend/queries.sql'
      - 'backend/schema.sql'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/internal/db/migrations/**'
      - 'backend/internal/models/**'
      - 'backend/internal/db/models.go'
      - 'backend/sqlc.yaml'
      - 'backend/queries.sql'
      - 'backend/schema.sql'
  workflow_dispatch:

env:
  GO_VERSION: '1.23'

jobs:
  schema-alignment:
    name: Validate Schema Alignment
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install sqlc
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Enable PostgreSQL extensions
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h localhost -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Run schema validation
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_SCHEMA: public
          KEEP_TEST_DB: false
        run: |
          chmod +x scripts/shell/validate_schema_alignment.sh
          ./scripts/shell/validate_schema_alignment.sh

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-validation-report
          path: |
            backend/schema-validation-*.log
          retention-days: 30

  sqlc-generation:
    name: Verify sqlc Generation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install sqlc
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Verify sqlc config
        working-directory: backend
        run: |
          if [ ! -f sqlc.yaml ]; then
            echo "❌ sqlc.yaml not found"
            exit 1
          fi
          echo "✅ sqlc.yaml found"

      - name: Run sqlc generate
        working-directory: backend
        run: |
          sqlc generate

      - name: Check for uncommitted changes
        working-directory: backend
        run: |
          if [ -n "$(git status --porcelain internal/db/)" ]; then
            echo "❌ sqlc generated files are out of sync"
            echo "Please run 'sqlc generate' and commit the changes"
            git diff internal/db/
            exit 1
          fi
          echo "✅ sqlc generated files are up to date"

  migration-verification:
    name: Verify Migration Files
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Enable PostgreSQL extensions
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h localhost -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Verify migrations apply cleanly
        env:
          PGPASSWORD: postgres
        working-directory: backend
        run: |
          # Create test database
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE migration_test;"

          # Apply migrations in order
          for migration in $(ls -1 internal/db/migrations/*.sql 2>/dev/null | grep -v "atlas.sum" | sort); do
            echo "Applying: $(basename $migration)"
            psql -h localhost -U postgres -d migration_test -f "$migration" || {
              echo "❌ Failed to apply migration: $migration"
              exit 1
            }
          done

          echo "✅ All migrations applied successfully"

      - name: Check for migration conflicts
        env:
          PGPASSWORD: postgres
        working-directory: backend
        run: |
          # Query for duplicate table definitions
          result=$(psql -h localhost -U postgres -d migration_test -t -c "
            SELECT table_name, COUNT(*) as count
            FROM information_schema.tables
            WHERE table_schema = 'public'
            AND table_type = 'BASE TABLE'
            GROUP BY table_name
            HAVING COUNT(*) > 1;
          ")

          if [ -n "$result" ]; then
            echo "❌ Duplicate table definitions found:"
            echo "$result"
            exit 1
          fi

          echo "✅ No migration conflicts detected"

  schema-documentation:
    name: Generate Schema Documentation
    runs-on: ubuntu-latest
    needs: [schema-alignment, sqlc-generation, migration-verification]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Apply migrations
        env:
          PGPASSWORD: postgres
        working-directory: backend
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h localhost -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

          for migration in $(ls -1 internal/db/migrations/*.sql 2>/dev/null | grep -v "atlas.sum" | sort); do
            psql -h localhost -U postgres -d postgres -f "$migration"
          done

      - name: Generate schema documentation
        env:
          PGPASSWORD: postgres
        run: |
          cat > schema-doc.md <<'EOF'
          # Database Schema Documentation

          Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Tables

          EOF

          # Get all tables
          psql -h localhost -U postgres -d postgres -t -c "
            SELECT table_name
            FROM information_schema.tables
            WHERE table_schema = 'public'
            AND table_type = 'BASE TABLE'
            ORDER BY table_name;
          " | while read -r table; do
            table=$(echo $table | xargs)
            if [ -n "$table" ]; then
              echo "### $table" >> schema-doc.md
              echo "" >> schema-doc.md
              echo '```' >> schema-doc.md
              psql -h localhost -U postgres -d postgres -c "\d $table" >> schema-doc.md
              echo '```' >> schema-doc.md
              echo "" >> schema-doc.md
            fi
          done

          echo "✅ Schema documentation generated"

      - name: Upload schema documentation
        uses: actions/upload-artifact@v4
        with:
          name: schema-documentation
          path: schema-doc.md
          retention-days: 90
