apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://localhost:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Extract trace ID from logs for correlation with Jaeger
        - matcherRegex: "trace_id[=:]\\s*([a-f0-9]+)"
          name: TraceID
          url: 'http://localhost:16686/trace/$${__value.raw}'
