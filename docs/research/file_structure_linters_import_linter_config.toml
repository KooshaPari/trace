# import-linter Configuration for Python Architecture Enforcement
# Add to pyproject.toml in the project root

[tool.importlinter]
# Root packages to analyze (update with actual package names)
root_packages = ["tracertm"]

# -----------------------------------------------------------------------------
# CONTRACTS: Define architectural rules
# -----------------------------------------------------------------------------

# Contract 1: Domain Layer Independence
# Prevent domain layer from depending on infrastructure or API layers
[[tool.importlinter.contracts]]
name = "Domain Layer Independence"
type = "forbidden"
source_modules = ["tracertm.domain"]
forbidden_modules = ["tracertm.infrastructure", "tracertm.api"]

# Contract 2: API to Services Dependency Direction
# Ensure API only depends on Services, not the reverse
[[tool.importlinter.contracts]]
name = "API to Services Only"
type = "layers"
layers = ["tracertm.api", "tracertm.services", "tracertm.domain", "tracertm.models"]

# Contract 3: No Direct Database Access from API
# API should go through services/repositories, not direct database access
[[tool.importlinter.contracts]]
name = "No Direct DB from API"
type = "forbidden"
source_modules = ["tracertm.api"]
forbidden_modules = ["tracertm.infrastructure.database"]

# Contract 4: Test Isolation
# Tests should not import from other test modules
[[tool.importlinter.contracts]]
name = "Test Isolation"
type = "forbidden"
source_modules = ["tests"]
forbidden_modules = ["tests.*"]

# Contract 5: No Circular Dependencies
# Detect circular imports between modules
[[tool.importlinter.contracts]]
name = "No Circular Dependencies"
type = "forbidden"
source_modules = ["tracertm"]
forbidden_modules = ["tracertm.*"]

