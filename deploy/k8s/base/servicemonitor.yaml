apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tracertm-api
  labels:
    app: tracertm-api
    release: prometheus
spec:
  selector:
    matchLabels:
      app: tracertm-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - default
    - tracertm
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tracertm-backend
  labels:
    app: tracertm-backend
    release: prometheus
spec:
  selector:
    matchLabels:
      app: tracertm-backend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - default
    - tracertm
