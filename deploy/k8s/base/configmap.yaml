apiVersion: v1
kind: ConfigMap
metadata:
  name: tracertm-config
  namespace: default
data:
  # CORS Configuration
  cors-origins: "https://tracertm.example.com,https://app.tracertm.example.com"

  # Prometheus Configuration
  prometheus-config.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: production
        environment: production

    scrape_configs:
    - job_name: 'go-backend'
      static_configs:
      - targets: ['go-backend:8080']
      metrics_path: '/metrics'
      scrape_interval: 15s

    - job_name: 'python-backend'
      static_configs:
      - targets: ['python-backend:8000']
      metrics_path: '/metrics'
      scrape_interval: 15s

    - job_name: 'postgres'
      static_configs:
      - targets: ['postgres-exporter:9187']

    - job_name: 'redis'
      static_configs:
      - targets: ['redis-exporter:9121']

---
apiVersion: v1
kind: Secret
metadata:
  name: tracertm-secrets
  namespace: default
type: Opaque
stringData:
  # These should be replaced with actual values in production
  # Use: kubectl create secret generic tracertm-secrets --from-literal=database-url="postgres://..." etc.
  database-url: "postgresql://tracertm:password@postgres:5432/tracertm?sslmode=require"
  redis-url: "redis://:password@redis:6379/0"
  jwt-secret: "REPLACE_WITH_ACTUAL_JWT_SECRET_MIN_32_CHARS"
  csrf-secret: "REPLACE_WITH_ACTUAL_CSRF_SECRET_MIN_32_CHARS"
  workos-client-id: ""
  workos-api-key: ""

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: go-backend
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: go-backend
  namespace: default
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: go-backend
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: go-backend
subjects:
- kind: ServiceAccount
  name: go-backend
  namespace: default
