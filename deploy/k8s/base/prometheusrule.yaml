apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tracertm-canary-metrics
  labels:
    app: tracertm
    prometheus: kube-prometheus
spec:
  groups:
  - name: tracertm-canary
    interval: 30s
    rules:
    # Error rate rules
    - record: tracertm:canary:error_rate
      expr: |
        sum(rate(http_requests_total{version="canary",status=~"5.."}[5m]))
        /
        sum(rate(http_requests_total{version="canary"}[5m]))

    - record: tracertm:stable:error_rate
      expr: |
        sum(rate(http_requests_total{version="stable",status=~"5.."}[5m]))
        /
        sum(rate(http_requests_total{version="stable"}[5m]))

    # Latency rules (P95)
    - record: tracertm:canary:latency_p95
      expr: |
        histogram_quantile(0.95,
          sum(rate(http_request_duration_seconds_bucket{version="canary"}[5m])) by (le)
        )

    - record: tracertm:stable:latency_p95
      expr: |
        histogram_quantile(0.95,
          sum(rate(http_request_duration_seconds_bucket{version="stable"}[5m])) by (le)
        )

    # Latency rules (P99)
    - record: tracertm:canary:latency_p99
      expr: |
        histogram_quantile(0.99,
          sum(rate(http_request_duration_seconds_bucket{version="canary"}[5m])) by (le)
        )

    - record: tracertm:stable:latency_p99
      expr: |
        histogram_quantile(0.99,
          sum(rate(http_request_duration_seconds_bucket{version="stable"}[5m])) by (le)
        )

    # Request rate
    - record: tracertm:canary:request_rate
      expr: |
        sum(rate(http_requests_total{version="canary"}[5m]))

    - record: tracertm:stable:request_rate
      expr: |
        sum(rate(http_requests_total{version="stable"}[5m]))

    # Success rate
    - record: tracertm:canary:success_rate
      expr: |
        sum(rate(http_requests_total{version="canary",status!~"5.."}[5m]))
        /
        sum(rate(http_requests_total{version="canary"}[5m]))

    - record: tracertm:stable:success_rate
      expr: |
        sum(rate(http_requests_total{version="stable",status!~"5.."}[5m]))
        /
        sum(rate(http_requests_total{version="stable"}[5m]))

    # Alerts for canary failures
    - alert: CanaryHighErrorRate
      expr: tracertm:canary:error_rate > 0.01
      for: 2m
      labels:
        severity: critical
        component: canary
      annotations:
        summary: "Canary deployment has high error rate"
        description: "Canary error rate is {{ $value | humanizePercentage }} (threshold: 1%)"

    - alert: CanaryHighLatency
      expr: tracertm:canary:latency_p95 > 0.5
      for: 2m
      labels:
        severity: warning
        component: canary
      annotations:
        summary: "Canary deployment has high latency"
        description: "Canary P95 latency is {{ $value }}s (threshold: 500ms)"

    - alert: CanaryPodCrashing
      expr: |
        sum(kube_pod_container_status_restarts_total{pod=~"tracertm-.*-canary-.*"})
        - sum(kube_pod_container_status_restarts_total{pod=~"tracertm-.*-canary-.*"} offset 5m) > 2
      for: 1m
      labels:
        severity: critical
        component: canary
      annotations:
        summary: "Canary pods are crash looping"
        description: "Canary pods have restarted {{ $value }} times in the last 5 minutes"

    - alert: CanaryPodNotReady
      expr: |
        sum(kube_pod_status_ready{condition="true",pod=~"tracertm-.*-canary-.*"})
        /
        sum(kube_pod_status_ready{pod=~"tracertm-.*-canary-.*"}) < 1
      for: 2m
      labels:
        severity: critical
        component: canary
      annotations:
        summary: "Canary pods are not ready"
        description: "Only {{ $value | humanizePercentage }} of canary pods are ready"
