apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracertm-api
  labels:
    app: tracertm-api
    version: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tracertm-api
  template:
    metadata:
      labels:
        app: tracertm-api
        version: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        image: tracertm-api:latest
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: APP_VERSION
          value: "latest"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tracertm-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: tracertm-secrets
              key: redis-url
        - name: NATS_URL
          valueFrom:
            secretKeyRef:
              name: tracertm-secrets
              key: nats-url
        - name: TEMPORAL_HOST
          value: "temporal:7233"
        - name: GO_BACKEND_URL
          value: "http://tracertm-backend:8080"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
      terminationGracePeriodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracertm-backend
  labels:
    app: tracertm-backend
    version: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tracertm-backend
  template:
    metadata:
      labels:
        app: tracertm-backend
        version: stable
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: backend
        image: tracertm-backend:latest
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: grpc
          containerPort: 9091
          protocol: TCP
        env:
        - name: APP_VERSION
          value: "latest"
        - name: DB_HOST
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: tracertm-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: tracertm-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: tracertm-secrets
              key: db-password
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: tracertm-secrets
              key: redis-url
        - name: NATS_URL
          valueFrom:
            secretKeyRef:
              name: tracertm-secrets
              key: nats-url
        - name: TEMPORAL_HOST
          value: "temporal:7233"
        - name: PYTHON_BACKEND_URL
          value: "http://tracertm-api:8000"
        - name: PORT
          value: "8080"
        - name: GRPC_PORT
          value: "9091"
        - name: GIN_MODE
          value: "release"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
      terminationGracePeriodSeconds: 30
