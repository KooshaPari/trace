apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tracertm-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Canary annotations (disabled by default)
    nginx.ingress.kubernetes.io/canary: "false"
    nginx.ingress.kubernetes.io/canary-weight: "0"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - tracertm.example.com
    secretName: tracertm-tls
  rules:
  - host: tracertm.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: tracertm-backend
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tracertm-api
            port:
              number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tracertm-ingress-canary
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Canary configuration
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "0"
    # Optional: canary by header for testing
    nginx.ingress.kubernetes.io/canary-by-header: "X-Canary"
    nginx.ingress.kubernetes.io/canary-by-header-value: "always"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - tracertm.example.com
    secretName: tracertm-tls
  rules:
  - host: tracertm.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: tracertm-backend-canary
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tracertm-api-canary
            port:
              number: 8000
