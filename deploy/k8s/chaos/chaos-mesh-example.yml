---
# Example Chaos Mesh scenarios for Kubernetes
# These require Chaos Mesh to be installed: https://chaos-mesh.org/docs/

# Network Delay - Inject 500ms latency to backend pods
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: backend-network-delay
  namespace: tracertm-staging
spec:
  action: delay
  mode: all
  selector:
    namespaces:
      - tracertm-staging
    labelSelectors:
      app: tracertm-backend
  delay:
    latency: "500ms"
    jitter: "100ms"
    correlation: "50"
  duration: "2m"
  scheduler:
    cron: "@every 6h"

---
# Pod Failure - Simulate pod crashes
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: backend-pod-kill
  namespace: tracertm-staging
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - tracertm-staging
    labelSelectors:
      app: tracertm-backend
  duration: "30s"
  scheduler:
    cron: "@every 12h"

---
# Network Partition - Simulate network partition between services
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: database-partition
  namespace: tracertm-staging
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - tracertm-staging
    labelSelectors:
      app: tracertm-backend
  direction: to
  target:
    mode: all
    selector:
      namespaces:
        - tracertm-staging
      labelSelectors:
        app: postgres
  duration: "1m"

---
# Bandwidth Limit - Throttle network bandwidth
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: bandwidth-limit
  namespace: tracertm-staging
spec:
  action: bandwidth
  mode: all
  selector:
    namespaces:
      - tracertm-staging
    labelSelectors:
      app: tracertm-backend
  bandwidth:
    rate: "1mbps"
    limit: 20000
    buffer: 10000
  duration: "3m"

---
# Stress Test - CPU/Memory pressure
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: backend-stress
  namespace: tracertm-staging
spec:
  mode: one
  selector:
    namespaces:
      - tracertm-staging
    labelSelectors:
      app: tracertm-backend
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "2m"

---
# DNS Chaos - Inject DNS failures
apiVersion: chaos-mesh.org/v1alpha1
kind: DNSChaos
metadata:
  name: dns-random-failure
  namespace: tracertm-staging
spec:
  action: random
  mode: all
  selector:
    namespaces:
      - tracertm-staging
    labelSelectors:
      app: tracertm-backend
  duration: "1m"

---
# HTTP Chaos - Inject HTTP-level failures
apiVersion: chaos-mesh.org/v1alpha1
kind: HTTPChaos
metadata:
  name: api-delay
  namespace: tracertm-staging
spec:
  mode: all
  selector:
    namespaces:
      - tracertm-staging
    labelSelectors:
      app: tracertm-backend
  target: Request
  port: 8080
  path: /api/*
  delay: 2s
  duration: "2m"

---
# Schedule - Daily chaos testing schedule
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: daily-chaos-tests
  namespace: tracertm-staging
spec:
  schedule: "@daily"
  historyLimit: 5
  concurrencyPolicy: Forbid
  type: NetworkChaos
  networkChaos:
    action: delay
    mode: one
    selector:
      namespaces:
        - tracertm-staging
      labelSelectors:
        app: tracertm-backend
    delay:
      latency: "300ms"
    duration: "5m"
