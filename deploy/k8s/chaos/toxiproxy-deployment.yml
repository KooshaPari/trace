---
apiVersion: v1
kind: Service
metadata:
  name: toxiproxy
  namespace: tracertm-staging
  labels:
    app: toxiproxy
spec:
  selector:
    app: toxiproxy
  ports:
    - name: http
      port: 8474
      targetPort: 8474
    - name: postgres-proxy
      port: 15432
      targetPort: 15432
    - name: redis-proxy
      port: 16379
      targetPort: 16379
    - name: nats-proxy
      port: 14222
      targetPort: 14222
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: toxiproxy
  namespace: tracertm-staging
  labels:
    app: toxiproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: toxiproxy
  template:
    metadata:
      labels:
        app: toxiproxy
    spec:
      containers:
        - name: toxiproxy
          image: ghcr.io/shopify/toxiproxy:2.9.0
          ports:
            - containerPort: 8474
              name: http
            - containerPort: 15432
              name: postgres-proxy
            - containerPort: 16379
              name: redis-proxy
            - containerPort: 14222
              name: nats-proxy
          livenessProbe:
            httpGet:
              path: /version
              port: 8474
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /version
              port: 8474
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
