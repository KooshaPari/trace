apiVersion: v1
kind: Service
metadata:
  name: nats-service
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: messaging
spec:
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
      protocol: TCP
    - name: monitoring
      port: 8222
      targetPort: 8222
      protocol: TCP
    - name: routing
      port: 6222
      targetPort: 6222
      protocol: TCP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: messaging
data:
  nats.conf: |
    # NATS Server Configuration
    port: 4222
    http_port: 8222

    # JetStream Configuration
    jetstream {
      store_dir: /data/jetstream
      max_mem: 512M
      max_file: 10G
    }

    # Logging
    debug: false
    trace: false
    logtime: true

    # Limits
    max_connections: 1000
    max_control_line: 4096
    max_payload: 1048576  # 1MB
    max_pending: 64MB

    # Write Deadline
    write_deadline: "10s"

    # Ping Interval
    ping_interval: "2m"
    ping_max: 3

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: messaging
spec:
  serviceName: nats-service
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
        app.kubernetes.io/name: tracertm
        app.kubernetes.io/component: messaging
    spec:
      containers:
      - name: nats
        image: nats:2.10-alpine
        imagePullPolicy: IfNotPresent
        command:
        - nats-server
        - --config
        - /etc/nats/nats.conf
        ports:
        - name: client
          containerPort: 4222
          protocol: TCP
        - name: monitoring
          containerPort: 8222
          protocol: TCP
        - name: routing
          containerPort: 6222
          protocol: TCP
        volumeMounts:
        - name: nats-storage
          mountPath: /data
        - name: nats-config
          mountPath: /etc/nats
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8222
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: nats-config
        configMap:
          name: nats-config
      securityContext:
        fsGroup: 1000
  volumeClaimTemplates:
  - metadata:
      name: nats-storage
      labels:
        app.kubernetes.io/name: tracertm
        app.kubernetes.io/component: messaging
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      # storageClassName: fast-ssd

---
# NATS Exporter for Prometheus monitoring (optional)
apiVersion: v1
kind: Service
metadata:
  name: nats-exporter-service
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app: nats-exporter
  ports:
    - name: metrics
      port: 7777
      targetPort: 7777
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-exporter
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats-exporter
  template:
    metadata:
      labels:
        app: nats-exporter
    spec:
      containers:
      - name: nats-exporter
        image: natsio/prometheus-nats-exporter:latest
        imagePullPolicy: IfNotPresent
        args:
        - -varz
        - -connz
        - -routez
        - -subz
        - -jsz=all
        - http://nats-service:8222
        ports:
        - name: metrics
          containerPort: 7777
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
