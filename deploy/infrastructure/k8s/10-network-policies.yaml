---
# Default deny all ingress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: tracertm
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Allow ingress to nginx from anywhere (internet-facing)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-ingress
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Ingress
  ingress:
  - from: []  # Allow from anywhere
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443

---
# Allow nginx to communicate with backends
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-to-backends
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: go-backend
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - podSelector:
        matchLabels:
          app: python-backend
    ports:
    - protocol: TCP
      port: 8000
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

---
# Allow backends to access database
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backends-to-postgres
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: go-backend
    - podSelector:
        matchLabels:
          app: python-backend
    ports:
    - protocol: TCP
      port: 5432

---
# Allow backends to access Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backends-to-redis
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: go-backend
    - podSelector:
        matchLabels:
          app: python-backend
    ports:
    - protocol: TCP
      port: 6379

---
# Allow backends to access NATS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backends-to-nats
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: nats
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: go-backend
    - podSelector:
        matchLabels:
          app: python-backend
    ports:
    - protocol: TCP
      port: 4222
    - protocol: TCP
      port: 8222

---
# Allow Go backend egress to all infrastructure
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: go-backend-egress
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: go-backend
  policyTypes:
  - Egress
  egress:
  # Allow to Python backend (cross-backend calls)
  - to:
    - podSelector:
        matchLabels:
          app: python-backend
    ports:
    - protocol: TCP
      port: 8000
  # Allow to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow to NATS
  - to:
    - podSelector:
        matchLabels:
          app: nats
    ports:
    - protocol: TCP
      port: 4222
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow external HTTPS (for external API calls)
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# Allow Python backend egress to all infrastructure
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: python-backend-egress
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: python-backend
  policyTypes:
  - Egress
  egress:
  # Allow to Go backend (cross-backend calls)
  - to:
    - podSelector:
        matchLabels:
          app: go-backend
    ports:
    - protocol: TCP
      port: 8080
  # Allow to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow to NATS
  - to:
    - podSelector:
        matchLabels:
          app: nats
    ports:
    - protocol: TCP
      port: 4222
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow external HTTPS (for WorkOS, webhooks, etc.)
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443

---
# Allow ingress from nginx to Go backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-to-go-backend
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: go-backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nginx
    ports:
    - protocol: TCP
      port: 8080

---
# Allow ingress from nginx to Python backend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-to-python-backend
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: python-backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nginx
    ports:
    - protocol: TCP
      port: 8000

---
# Allow Prometheus to scrape metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: tracertm
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: go-backend
    ports:
    - protocol: TCP
      port: 9090
  - to:
    - podSelector:
        matchLabels:
          app: python-backend
    ports:
    - protocol: TCP
      port: 9091
  - to:
    - podSelector:
        matchLabels:
          app: redis-exporter
    ports:
    - protocol: TCP
      port: 9121
  - to:
    - podSelector:
        matchLabels:
          app: nats-exporter
    ports:
    - protocol: TCP
      port: 7777
  - to:
    - podSelector:
        matchLabels:
          app: postgres-exporter
    ports:
    - protocol: TCP
      port: 9187
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

---
# Allow all pods to receive metrics scraping
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-ingress
  namespace: tracertm
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - go-backend
      - python-backend
      - redis-exporter
      - nats-exporter
      - postgres-exporter
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
