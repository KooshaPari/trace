apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database credentials
  DATABASE_USER: tracertm
  DATABASE_PASSWORD: CHANGE_ME_IN_PRODUCTION_USE_STRONG_PASSWORD

  # JWT secret (minimum 32 characters)
  JWT_SECRET: CHANGE_ME_MIN_32_CHARS_RANDOM_STRING_FOR_JWT

  # WorkOS credentials (for authentication)
  WORKOS_API_KEY: sk_test_CHANGE_ME_YOUR_WORKOS_API_KEY
  WORKOS_CLIENT_ID: client_CHANGE_ME_YOUR_WORKOS_CLIENT_ID

  # Redis password (empty for no auth in dev, set in production)
  REDIS_PASSWORD: ""

  # NATS credentials (if using auth)
  NATS_USER: ""
  NATS_PASSWORD: ""

  # Secret key for application
  SECRET_KEY: CHANGE_ME_RANDOM_SECRET_KEY_FOR_APP

  # API keys for external services (if needed)
  GITHUB_TOKEN: ""
  SLACK_WEBHOOK_URL: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: tls-cert
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
stringData:
  # IMPORTANT: Replace with your actual TLS certificate and key
  # You can generate self-signed certs for testing with:
  # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #   -keyout tls.key -out tls.crt -subj "/CN=tracertm.local"
  # Then base64 encode them for production use
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_BASE64_ENCODED_CERTIFICATE
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_YOUR_BASE64_ENCODED_PRIVATE_KEY
    -----END PRIVATE KEY-----

---
# Database initialization secret (for init scripts)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-init
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: database
type: Opaque
stringData:
  init.sql: |
    -- Initialize database with required extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pg_trgm";

    -- Create read-only user for reporting (optional)
    -- CREATE USER tracertm_readonly WITH PASSWORD 'CHANGE_ME';
    -- GRANT CONNECT ON DATABASE tracertm TO tracertm_readonly;
    -- GRANT USAGE ON SCHEMA public TO tracertm_readonly;
    -- GRANT SELECT ON ALL TABLES IN SCHEMA public TO tracertm_readonly;
