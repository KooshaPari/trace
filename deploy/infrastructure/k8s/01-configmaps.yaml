apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: config
data:
  # Database Configuration
  DATABASE_HOST: postgres-service
  DATABASE_PORT: "5432"
  DATABASE_NAME: tracertm

  # Redis Configuration
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"

  # NATS Configuration
  NATS_URL: nats://nats-service:4222
  NATS_BRIDGE_ENABLED: "true"
  NATS_JETSTREAM_ENABLED: "true"

  # Service URLs
  GO_BACKEND_URL: http://go-backend-service:8080
  PYTHON_BACKEND_URL: http://python-backend-service:8000

  # Feature Flags
  FEATURE_NATS_EVENTS: "true"
  FEATURE_CROSS_BACKEND_CALLS: "true"
  FEATURE_SHARED_CACHE: "true"
  FEATURE_HYBRID_ARCHITECTURE: "true"

  # Application Settings
  LOG_LEVEL: info
  ENVIRONMENT: production

  # CORS Settings (adjust for production)
  CORS_ORIGINS: "https://tracertm.com,https://app.tracertm.com"

  # Pool Settings
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "10"
  REDIS_POOL_SIZE: "10"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: nginx
data:
  tracertm.conf: |
    # Upstream definitions
    upstream python_backend {
      least_conn;
      server python-backend-service:8000 max_fails=3 fail_timeout=30s weight=1;
      keepalive 32;
    }

    upstream go_backend {
      least_conn;
      server go-backend-service:8080 max_fails=3 fail_timeout=30s weight=1;
      keepalive 32;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Cache zones
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # HTTP server - redirect to HTTPS
    server {
      listen 80;
      listen [::]:80;
      server_name _;

      # Health check endpoint (no redirect)
      location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
      }

      # Redirect all other traffic to HTTPS
      location / {
        return 301 https://$host$request_uri;
      }
    }

    # HTTPS server
    server {
      listen 443 ssl http2;
      listen [::]:443 ssl http2;
      server_name _;

      # SSL configuration
      ssl_certificate /etc/nginx/certs/tls.crt;
      ssl_certificate_key /etc/nginx/certs/tls.key;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_ciphers HIGH:!aNULL:!MD5;
      ssl_prefer_server_ciphers on;
      ssl_session_cache shared:SSL:10m;
      ssl_session_timeout 10m;

      # Security headers
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;

      # Connection limits
      limit_conn conn_limit 10;

      # Health check
      location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
      }

      # Python backend routes (FastAPI/SQLAlchemy workload)
      location ~ ^/api/(projects|items|links|features|specifications|test-runs|test-suites|test-cases|executions) {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for complex queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
      }

      # Go backend routes (high-performance workload)
      location ~ ^/api/(health|metrics|events|webhooks|integrations) {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Faster timeouts for Go
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Minimal buffering
        proxy_buffering off;
      }

      # Auth routes - stricter rate limiting
      location ~ ^/api/(auth|login|logout|register) {
        limit_req zone=auth_limit burst=5 nodelay;

        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching for auth
        proxy_no_cache 1;
        proxy_cache_bypass 1;
      }

      # WebSocket support (NATS bridge, if exposed)
      location /ws {
        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
      }

      # Static files / Frontend (if served by nginx)
      location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
          expires 1y;
          add_header Cache-Control "public, immutable";
        }
      }

      # Deny access to hidden files
      location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
      }
    }
