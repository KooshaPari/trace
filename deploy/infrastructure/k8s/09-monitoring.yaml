---
# Prometheus ConfigMap (if deploying Prometheus in-cluster)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
            - tracertm
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__

      - job_name: 'go-backend'
        static_configs:
        - targets: ['go-backend-service:9090']
          labels:
            component: 'backend-go'

      - job_name: 'python-backend'
        static_configs:
        - targets: ['python-backend-service:9091']
          labels:
            component: 'backend-python'

      - job_name: 'redis'
        static_configs:
        - targets: ['redis-exporter-service:9121']
          labels:
            component: 'redis'

      - job_name: 'nats'
        static_configs:
        - targets: ['nats-exporter-service:7777']
          labels:
            component: 'nats'

      - job_name: 'postgres'
        static_configs:
        - targets: ['postgres-exporter-service:9187']
          labels:
            component: 'postgres'

---
# Prometheus Deployment (lightweight in-cluster monitoring)
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--storage.tsdb.retention.time=7d'
        - '--web.enable-lifecycle'
        ports:
        - name: web
          containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        emptyDir: {}
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534

---
# Grafana Deployment (optional visualization)
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus-service:9090
      isDefault: true
      editable: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:latest
        ports:
        - name: web
          containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          value: "admin"  # CHANGE IN PRODUCTION
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: storage
          mountPath: /var/lib/grafana
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 472
          allowPrivilegeEscalation: false
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: storage
        emptyDir: {}

---
# PostgreSQL Exporter for Prometheus
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter-service
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:latest
        ports:
        - name: metrics
          containerPort: 9187
        env:
        - name: DATA_SOURCE_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-exporter-secret
              key: DATA_SOURCE_NAME
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-secret
  namespace: tracertm
  labels:
    app.kubernetes.io/name: tracertm
    app.kubernetes.io/component: monitoring
type: Opaque
stringData:
  DATA_SOURCE_NAME: "postgresql://tracertm:CHANGE_ME_IN_PRODUCTION_USE_STRONG_PASSWORD@postgres-service:5432/tracertm?sslmode=disable"
