# TracerTM Nginx API Gateway Configuration
# Intelligent routing between Go and Python backends

upstream python_backend {
    server python:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream go_backend {
    server go:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Cache configuration
proxy_cache_path /var/cache/nginx/go levels=1:2 keys_zone=go_cache:10m max_size=1g inactive=60m use_temp_path=off;

# Logging format with backend routing info
log_format gateway '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'backend=$upstream_addr cache=$upstream_cache_status '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';

server {
    listen 80;
    server_name localhost;

    access_log /var/log/nginx/gateway.log gateway;
    error_log /var/log/nginx/gateway_error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Request size limits
    client_max_body_size 100M;
    client_body_buffer_size 1M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Python-only services
    # AI, specifications, analytics, execution, MCP, blockchain
    location ~ ^/api/v1/(ai|specifications|spec-analytics|execution|hatchet|chaos|mcp|recording|blockchain)(/.*)?$ {
        limit_req zone=ai_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # For AI streaming responses
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;

        # Long timeout for AI and executions
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # CORS: backends set CORS headers; do not add here to avoid duplicate values
    }

    # Go services (high performance)
    # Items, links, projects, graph, bulk operations, search, webhooks, traceability
    location ~ ^/api/v1/(items|links|projects|graph|bulk|search|export|import|webhooks|traceability)(/.*)?$ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 50;

        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Enable caching for read operations
        proxy_cache go_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$request_uri|$request_body";
        proxy_cache_bypass $http_cache_control;
        add_header X-Cache-Status $upstream_cache_status;

        # CORS: backends set CORS; do not add here to avoid duplicate headers
    }

    # Authentication (Python backend)
    location ~ ^/api/v1/auth(/.*)?$ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://python_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # CORS: backends set CORS; do not add here to avoid duplicate headers
    }

    # WebSocket (Go backend) – canonical path used by frontend
    location /api/v1/ws {
        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Legacy WebSocket path
    location /ws {
        proxy_pass http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # Health checks (both backends)
    location /health {
        access_log off;
        proxy_pass http://go_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /health/go {
        access_log off;
        proxy_pass http://go_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /health/python {
        access_log off;
        proxy_pass http://python_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Metrics endpoint
    location /metrics {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;  # Docker networks
        deny all;
    }

    # Frontend static files (if serving from nginx)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
