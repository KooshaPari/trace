[server]
http_port = 3000
root_url = http://localhost:4000/grafana/

[database]
type = sqlite3
path = .grafana/grafana.db

[security]
admin_user = admin
admin_password = admin

[auth.anonymous]
enabled = false

[provisioning]
datasources = monitoring/grafana/provisioning/datasources
dashboards = monitoring/grafana/provisioning/dashboards

[paths]
data = .grafana/data
logs = .grafana/logs
plugins = .grafana/plugins
provisioning = monitoring/grafana/provisioning
