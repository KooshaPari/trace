global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'tracertm'
    environment: 'production'
    monitoring: 'prometheus'

# Alertmanager configuration for sending alerts
alerting:
  alertmanagers: []

# Load alerting and recording rules
rule_files:
  - 'alerts.yml'

scrape_configs:
  # PostgreSQL
  - job_name: 'postgresql'
    static_configs:
      - targets: ['localhost:9187']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']

  # Node/System
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  # Go Backend
  - job_name: 'go-backend'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/metrics'

  # Python Backend
  - job_name: 'python-backend'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'

  # Caddy
  - job_name: 'caddy'
    static_configs:
      - targets: ['localhost:2019']
    metrics_path: '/metrics'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
